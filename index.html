<html lang="en">
<head>
<meta charset="UTF-8">

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--ab:#020D18;--ab2:#04192E;--ab3:#071F38;--neon:#00E5FF;--oc:#00B4D8;--txd:#4A7A90;--am:#EF9F27;--re:#E24B4A}
html,body{background:var(--ab);overscroll-behavior:none}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;display:flex;justify-content:center;min-height:100vh;overflow:hidden}
.screen{max-width:390px;width:100%;min-height:100vh;background:var(--ab);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;position:relative;overflow:hidden;touch-action:none}

@keyframes orbdrift{0%,100%{transform:translate(0,0)}50%{transform:translate(8px,-8px)}}
.orb1{position:absolute;width:220px;height:220px;border-radius:50%;background:rgba(0,180,216,.05);border:1px solid rgba(0,180,216,.1);top:-60px;right:-60px;animation:orbdrift 8s ease-in-out infinite}
.orb2{position:absolute;width:130px;height:130px;border-radius:50%;background:rgba(0,180,216,.04);border:1px solid rgba(0,180,216,.08);bottom:-30px;left:-30px;animation:orbdrift 7s ease-in-out infinite 1s}
@keyframes scan{0%{top:0}100%{top:110%}}
.scan{position:absolute;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--neon),transparent);animation:scan 3.5s linear infinite;opacity:.2;pointer-events:none}

.flash{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:40}
.flash.fire{animation:flashpop .35s ease-out}
@keyframes flashpop{0%{opacity:0}8%{opacity:.85}100%{opacity:0}}

@keyframes camshake{
  0%{transform:translate(0,0) rotate(0)}
  10%{transform:translate(-7px,4px) rotate(-0.7deg)}
  20%{transform:translate(6px,-5px) rotate(0.6deg)}
  30%{transform:translate(-5px,5px) rotate(-0.5deg)}
  40%{transform:translate(7px,-3px) rotate(0.7deg)}
  50%{transform:translate(-6px,-4px) rotate(-0.4deg)}
  60%{transform:translate(5px,4px) rotate(0.4deg)}
  70%{transform:translate(-4px,-3px) rotate(-0.3deg)}
  80%{transform:translate(3px,3px) rotate(0.2deg)}
  100%{transform:translate(0,0) rotate(0)}
}
.shaking{animation:camshake .45s ease-out}

.hp-header{position:relative;z-index:2;width:100%;max-width:320px;margin-bottom:8px}
.hp-label-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
.hp-title{font-size:11px;color:var(--txd);text-transform:uppercase;letter-spacing:.12em}
.hp-value{font-size:13px;font-weight:600;color:var(--neon);letter-spacing:.04em}
.hp-track{height:10px;background:var(--ab3);border-radius:2px;overflow:hidden;border:1px solid rgba(0,180,216,.25);position:relative}
.hp-fill{height:100%;background:linear-gradient(90deg,#993D3D,var(--re));border-radius:2px;transition:width .4s cubic-bezier(.4,0,.2,1);position:relative}
.hp-fill.healthy{background:linear-gradient(90deg,var(--oc),var(--neon))}
.hp-fill::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(45deg,rgba(255,255,255,.08) 0 6px,transparent 6px 12px)}

.greeting{font-size:11px;color:var(--txd);text-transform:uppercase;letter-spacing:.12em;margin-bottom:6px;position:relative;z-index:2}
.day-title{font-size:21px;font-weight:500;color:var(--neon);position:relative;text-align:center;letter-spacing:.05em;z-index:2}
.day-sub{font-size:11px;color:var(--txd);position:relative;text-align:center;margin-bottom:24px;margin-top:4px;text-transform:uppercase;letter-spacing:.08em;z-index:2}

.shield-wrap{position:relative;width:200px;height:200px;cursor:pointer;user-select:none;z-index:2;-webkit-tap-highlight-color:transparent}
.shield-body{width:200px;height:200px;transition:transform .08s ease;position:relative}

@keyframes ringpulse{0%{opacity:0;transform:scale(.85)}50%{opacity:.7}100%{opacity:0;transform:scale(1.18)}}
.ring{position:absolute;border-radius:50%;border:1px solid rgba(0,229,255,.4);opacity:0}
.ring1{inset:-10px;animation:ringpulse 2.2s ease-in-out infinite}
.ring2{inset:-22px;animation:ringpulse 2.2s ease-in-out infinite .5s;border-color:rgba(0,180,216,.25)}
.ring3{inset:-36px;animation:ringpulse 2.2s ease-in-out infinite 1s;border-color:rgba(0,180,216,.15)}

.impact-ring{position:absolute;inset:-10px;border-radius:50%;border:2px solid var(--neon);opacity:0;pointer-events:none}
.impact-ring.fire{animation:impactexpand .4s ease-out}
@keyframes impactexpand{0%{opacity:.9;transform:scale(.6)}100%{opacity:0;transform:scale(1.7)}}

.dmg-popup{position:absolute;font-size:22px;font-weight:700;color:#fff;text-shadow:0 0 12px var(--re),0 2px 4px rgba(0,0,0,.6);pointer-events:none;z-index:10;opacity:0;left:50%;top:30%}
.dmg-popup.fire{animation:dmgfloat .7s cubic-bezier(.2,.8,.3,1) forwards}
@keyframes dmgfloat{
  0%{opacity:0;transform:translate(-50%,0) scale(.6)}
  15%{opacity:1;transform:translate(-50%,-10px) scale(1.3)}
  100%{opacity:0;transform:translate(calc(-50% + var(--dx,0px)),-70px) scale(1)}
}

.hint{font-size:11px;color:var(--txd);margin-top:22px;position:relative;text-align:center;text-transform:uppercase;letter-spacing:.1em;z-index:2;transition:opacity .3s}
@keyframes blink{0%,100%{opacity:.35}50%{opacity:1}}
.hint.blinking{animation:blink 1.8s ease-in-out infinite}

.broken-screen{display:none;flex-direction:column;align-items:center;position:relative;z-index:2}
@keyframes popin{0%{opacity:0;transform:scale(.6) translateY(10px)}60%{transform:scale(1.06) translateY(0)}100%{opacity:1;transform:scale(1) translateY(0)}}
.b-icon{font-size:54px;margin-bottom:14px;opacity:0}
.b-icon.show{animation:popin .5s cubic-bezier(.34,1.56,.64,1) forwards}
.b-title{font-size:22px;font-weight:600;color:var(--neon);text-align:center;opacity:0;transform:translateY(10px);transition:all .4s ease;letter-spacing:.05em}
.b-title.show{opacity:1;transform:translateY(0)}
.b-sub{font-size:12px;color:var(--txd);text-align:center;margin-top:8px;opacity:0;transform:translateY(8px);transition:all .4s ease;line-height:1.7;text-transform:uppercase;letter-spacing:.06em}
.b-sub.show{opacity:1;transform:translateY(0)}
.xp-row{margin-top:22px;background:var(--ab2);border:1px solid rgba(0,180,216,.2);border-radius:4px;padding:14px 24px;display:flex;align-items:center;gap:16px;opacity:0;transform:translateY(8px);transition:all .4s ease}

@keyframes levelUpPop{0%{opacity:0;transform:scale(.5) translateY(10px)}55%{transform:scale(1.15) translateY(0)}100%{opacity:1;transform:scale(1) translateY(0)}}
@keyframes levelUpGlow{0%,100%{box-shadow:0 0 10px rgba(0,229,255,.3)}50%{box-shadow:0 0 24px rgba(0,229,255,.6)}}
.level-up-badge{margin-top:14px;display:none;align-items:center;gap:8px;background:rgba(0,229,255,.1);border:1px solid var(--neon);border-radius:4px;padding:10px 20px}
.level-up-badge.show{display:flex;animation:levelUpPop .5s cubic-bezier(.34,1.56,.64,1),levelUpGlow 1.6s ease-in-out infinite}
.level-up-badge-text{font-size:13px;font-weight:600;color:var(--neon);text-transform:uppercase;letter-spacing:.06em}
.xp-row.show{opacity:1;transform:translateY(0)}
.xp-val{font-size:18px;font-weight:600;color:var(--neon);letter-spacing:.04em}
.xp-lbl{font-size:10px;color:var(--txd);margin-top:2px;text-transform:uppercase;letter-spacing:.08em}
.enter-btn{margin-top:18px;padding:13px 34px;background:var(--oc);border:none;border-radius:4px;color:var(--ab);font-size:12px;font-weight:600;cursor:pointer;opacity:0;transform:translateY(8px);transition:all .4s ease,background .15s;text-transform:uppercase;letter-spacing:.08em}
.enter-btn.show{opacity:1;transform:translateY(0)}
.enter-btn:hover{background:var(--neon)}

.shard{position:absolute;pointer-events:none;z-index:25}
.spark{position:absolute;pointer-events:none;border-radius:50%;z-index:26}

.skip-link{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);font-size:10px;color:var(--txd);text-decoration:underline;z-index:5;opacity:.6}

.already-done-screen{display:none;flex-direction:column;align-items:center;position:relative;z-index:2;padding:0 12px}
.already-done-icon{font-size:48px;color:var(--neon);margin-bottom:16px}
.already-done-title{font-size:19px;font-weight:600;color:var(--neon);text-align:center;letter-spacing:.04em}
.already-done-sub{font-size:12px;color:var(--txd);text-align:center;margin-top:10px;line-height:1.7}
.already-done-screen .enter-btn{margin-top:24px}
</style>
</head>
<body>
<div id="global-error-banner" style="display:none;position:fixed;top:0;left:0;right:0;background:#5a1010;color:#ffdede;padding:12px 14px;font-family:monospace;font-size:11px;z-index:99999;max-height:40vh;overflow-y:auto;white-space:pre-wrap;border-bottom:2px solid #ff4444"></div>
<script>
window.addEventListener('error', function(e){
  var banner=document.getElementById('global-error-banner');
  if(banner){
    banner.style.display='block';
    banner.textContent += '[JS ERROR] '+e.message+'\n  at '+e.filename+':'+e.lineno+':'+e.colno+'\n\n';
  }
});
</script>

<div class="screen" id="screen-wrap">
  <div class="orb1"></div><div class="orb2"></div><div class="scan"></div>
  <div class="flash" id="flash"></div>

  <div id="main-content">
    <div class="hp-header">
      <div class="hp-label-row"><span class="hp-title">Daily seal</span><span class="hp-value" id="hp-value">100 / 100</span></div>
      <div class="hp-track"><div class="hp-fill healthy" id="hp-fill" style="width:100%"></div></div>
    </div>

    <div class="greeting" id="greeting">Good morning, Murat</div>
    <div class="day-title" id="day-title">Monday</div>
    <div class="day-sub" id="day-sub">Jun 22 · Day 6 of streak</div>

    <div class="shield-wrap" id="shield-wrap" onclick="hitShield(event)">
      <div class="ring ring1"></div><div class="ring ring2"></div><div class="ring ring3"></div>
      <div class="impact-ring" id="impact-ring"></div>
      <div class="shield-body" id="shield-body">
        <svg width="200" height="200" viewBox="0 0 200 200" role="img">
          <title>Daily shield</title>
          <desc>Tap repeatedly to deal damage and break the daily seal</desc>
          <path id="shield-outer" d="M100 14 L174 44 L174 104 Q174 158 100 186 Q26 158 26 104 L26 44 Z" fill="#04192E" stroke="rgba(0,180,216,0.55)" stroke-width="1.5"/>
          <path d="M100 30 L161 56 L161 104 Q161 149 100 169 Q39 149 39 104 L39 56 Z" fill="none" stroke="rgba(0,180,216,0.22)" stroke-width="1"/>
          <path id="shield-inner" d="M100 46 L148 67 L148 103 Q148 140 100 157 Q52 140 52 103 L52 67 Z" fill="#020D18"/>
          <text x="100" y="118" text-anchor="middle" font-size="48" fill="rgba(0,229,255,0.85)" font-family="serif">⚔</text>
          <path d="M100 14 L174 44 L174 104 Q174 158 100 186 Q26 158 26 104 L26 44 Z" fill="none" stroke="rgba(0,229,255,0.15)" stroke-width="0.5"/>
          <g id="crack-layer"></g>
        </svg>
      </div>
    </div>

    <div class="hint blinking" id="hint">Tap to attack the seal</div>
  </div>

  <div class="broken-screen" id="broken-screen">
    <div class="b-icon" id="b-icon">🛡️</div>
    <div class="b-title" id="b-title">Seal broken</div>
    <div class="b-sub" id="b-sub">Your day has begun, warrior.<br>The quests await.</div>
    <div class="level-up-badge" id="level-up-badge"></div>
    <div class="xp-row" id="b-xp">
      <div style="text-align:center"><div class="xp-val">+25 XP</div><div class="xp-lbl">Willpower</div></div>
      <div style="width:1px;height:36px;background:rgba(0,180,216,.2)"></div>
      <div style="text-align:center"><div class="xp-val" id="b-streak-xp">+10 XP</div><div class="xp-lbl">Streak bonus</div></div>
    </div>
    <button class="enter-btn" id="b-btn" onclick="enterQuestBoard()">Enter quest board →</button>
  </div>

  <div class="already-done-screen" id="already-done-screen">
    <div class="already-done-icon"><i class="ti ti-shield-check"></i></div>
    <div class="already-done-title">Seal already broken today</div>
    <div class="already-done-sub">Come back tomorrow for a new seal to break.<br>Your quests are ready now.</div>
    <button class="enter-btn show" onclick="window.location.href='quests.html'">Enter quest board →</button>
  </div>
</div>

<script>
GameLoop.bootstrapDay();
let gs=GameState.get();

// If the ritual is already done today (e.g. user reloaded the page after
// breaking the seal), show a clear "already done" screen instead of
// leaving the shield visible and tappable — previously the shield stayed
// fully clickable even when already completed, which let a same-day
// re-tap instantly "break" it again (HP was already 0) and silently
// double-grant XP/skills/achievements/boss-damage a second time.
if(Shield.isTodayAlreadyDone(gs)){
  document.getElementById('main-content').style.display='none';
  document.getElementById('already-done-screen').style.display='flex';
}

const now=new Date();
const days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const h=now.getHours();
document.getElementById('greeting').textContent=(h<12?'Good morning':h<17?'Good afternoon':'Good evening')+', Murat';
document.getElementById('day-title').textContent=days[now.getDay()];
document.getElementById('day-sub').textContent=months[now.getMonth()]+' '+now.getDate()+' · Day '+gs.streak+' of streak';

let hitCount=0;
let broken=false;

function vibrate(pattern){
  if(navigator.vibrate){
    try{ navigator.vibrate(pattern); }catch(e){ /* unsupported on this device, fail silently */ }
  }
}

function updateHpBar(){
  const pct=Shield.getHpPercent(gs);
  const fill=document.getElementById('hp-fill');
  fill.style.width=pct+'%';
  fill.classList.toggle('healthy',pct>50);
  document.getElementById('hp-value').textContent=gs.shieldRitual.currentHp+' / '+gs.shieldRitual.maxHp;
}

function flashScreen(){
  const f=document.getElementById('flash');
  f.classList.remove('fire');void f.offsetWidth;f.classList.add('fire');
}

function shakeScreen(intensity){
  const wrap=document.getElementById('screen-wrap');
  wrap.classList.remove('shaking');void wrap.offsetWidth;
  wrap.style.animationDuration=(0.25+intensity*0.05)+'s';
  wrap.classList.add('shaking');
}

function fireImpactRing(){
  const ring=document.getElementById('impact-ring');
  ring.classList.remove('fire');void ring.offsetWidth;ring.classList.add('fire');
}

function spawnDamagePopup(damage,tapX,tapY){
  const wrap=document.getElementById('shield-wrap');
  const p=document.createElement('div');
  p.className='dmg-popup';
  p.textContent='-'+damage;
  const rect=wrap.getBoundingClientRect();
  const localX=tapX!=null?tapX-rect.left:rect.width/2;
  const localY=tapY!=null?tapY-rect.top:rect.height/2;
  p.style.left=localX+'px';p.style.top=localY+'px';
  p.style.setProperty('--dx',(Math.random()*40-20).toFixed(0)+'px');
  wrap.appendChild(p);
  requestAnimationFrame(()=>p.classList.add('fire'));
  setTimeout(()=>p.remove(),750);
}

function spawnCrack(seedAngleBase,length){
  const svg=document.querySelector('#shield-body svg');
  const cx=100,cy=104;
  const baseAngle=seedAngleBase+(Math.random()-0.5)*40;
  const rad=baseAngle*Math.PI/180;
  const startR=8+Math.random()*22;
  const sx=cx+Math.cos(rad)*startR,sy=cy+Math.sin(rad)*startR;
  const segments=3+Math.floor(Math.random()*2);
  let path='M '+sx.toFixed(1)+' '+sy.toFixed(1);
  let curR=startR,curAngle=baseAngle;
  for(let i=0;i<segments;i++){
    curR+=length/segments;
    curAngle+=(Math.random()-0.5)*30;
    const r2=curAngle*Math.PI/180;
    const nx=cx+Math.cos(r2)*curR,ny=cy+Math.sin(r2)*curR;
    path+=' L '+nx.toFixed(1)+' '+ny.toFixed(1);
  }
  const g=document.createElementNS('http://www.w3.org/2000/svg','g');
  const glow=document.createElementNS('http://www.w3.org/2000/svg','path');
  glow.setAttribute('d',path);glow.setAttribute('fill','none');
  glow.setAttribute('stroke','rgba(0,229,255,0.35)');glow.setAttribute('stroke-width','4');
  glow.setAttribute('stroke-linecap','round');glow.setAttribute('opacity','0');
  const line=document.createElementNS('http://www.w3.org/2000/svg','path');
  line.setAttribute('d',path);line.setAttribute('fill','none');
  line.setAttribute('stroke','#CFF6FF');line.setAttribute('stroke-width','1.4');
  line.setAttribute('stroke-linecap','round');line.setAttribute('opacity','0');
  g.appendChild(glow);g.appendChild(line);
  document.getElementById('crack-layer').appendChild(g);
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    glow.style.transition='opacity .25s';line.style.transition='opacity .2s';
    glow.setAttribute('opacity','1');line.setAttribute('opacity','1');
  }));
}

function tintShield(damagePct){
  const inner=document.getElementById('shield-inner');
  const outer=document.getElementById('shield-outer');
  const t=Math.min(1,damagePct/100);
  const r=Math.round(2+t*40),g=Math.round(13+t*20),b=Math.round(24+t*50);
  inner.setAttribute('fill','rgb('+r+','+g+','+b+')');
  outer.setAttribute('stroke','rgba(0,229,255,'+(0.55+t*0.4).toFixed(2)+')');
}

function shakeShieldOnly(power){
  const sb=document.getElementById('shield-body');
  sb.style.transition='transform .06s';
  sb.style.transform='translate('+Math.round((Math.random()-.5)*power)+'px,'+Math.round((Math.random()-.5)*power*0.6)+'px) scale('+(1-power*0.004)+')';
  setTimeout(()=>{
    sb.style.transform='translate(0,0) scale(1)';
    setTimeout(()=>{sb.style.transition='transform .08s ease'},60);
  },70);
}

function spawnShards(count){
  const wrap=document.getElementById('screen-wrap');
  const cols=['rgba(0,229,255,0.85)','rgba(0,180,216,0.65)','rgba(0,100,140,0.5)','rgba(210,240,250,0.55)'];
  for(let i=0;i<count;i++){
    const s=document.createElement('div');s.className='shard';
    const size=6+Math.random()*16;
    if(Math.random()>0.5){
      s.style.width='0';s.style.height='0';
      const bw=size*0.6,bh=size;
      s.style.borderLeft=bw+'px solid transparent';
      s.style.borderRight=bw+'px solid transparent';
      s.style.borderBottom=bh+'px solid '+cols[Math.floor(Math.random()*cols.length)];
    }else{
      s.style.width=Math.round(size)+'px';
      s.style.height=Math.round(size*0.45+2)+'px';
      s.style.background=cols[Math.floor(Math.random()*cols.length)];
      s.style.borderRadius='1px';
    }
    s.style.left='50%';s.style.top='44%';s.style.opacity='1';
    s.style.transform='translate(-50%,-50%) rotate(0deg)';
    s.style.transition='transform '+(0.5+Math.random()*0.6).toFixed(2)+'s cubic-bezier(.15,.6,.4,1),opacity .45s '+(0.25+Math.random()*0.2).toFixed(2)+'s';
    wrap.appendChild(s);
    const angle=Math.random()*360,dist=90+Math.random()*150;
    const tx=Math.round(Math.cos(angle*Math.PI/180)*dist),ty=Math.round(Math.sin(angle*Math.PI/180)*dist)-20;
    const rot=Math.round((Math.random()-0.5)*720);
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      s.style.transform='translate(calc(-50% + '+tx+'px),calc(-50% + '+ty+'px)) rotate('+rot+'deg)';
      s.style.opacity='0';
    }));
    setTimeout(()=>s.remove(),1100);
  }
}

function spawnSparks(count){
  const wrap=document.getElementById('screen-wrap');
  for(let i=0;i<count;i++){
    const sp=document.createElement('div');sp.className='spark';
    const size=2+Math.random()*3;
    sp.style.width=size+'px';sp.style.height=size+'px';sp.style.background='#fff';
    sp.style.left='50%';sp.style.top='44%';sp.style.opacity='1';
    sp.style.transform='translate(-50%,-50%)';
    sp.style.transition='transform .4s ease-out,opacity .4s ease-out';
    wrap.appendChild(sp);
    const angle=Math.random()*360,dist=30+Math.random()*60;
    const tx=Math.cos(angle*Math.PI/180)*dist,ty=Math.sin(angle*Math.PI/180)*dist;
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      sp.style.transform='translate(calc(-50% + '+tx.toFixed(0)+'px),calc(-50% + '+ty.toFixed(0)+'px))';
      sp.style.opacity='0';
    }));
    setTimeout(()=>sp.remove(),450);
  }
}

function hitShield(evt){
  if(broken) return;
  if(Shield.isTodayAlreadyDone(gs)) return;
  hitCount++;

  let hitResult;
  gs=GameState.set(state=>{ hitResult=Shield.applyHit(state,hitCount); });

  updateHpBar();
  spawnDamagePopup(hitResult.damage,evt?evt.clientX:null,evt?evt.clientY:null);
  shakeShieldOnly(6+hitCount*2);
  shakeScreen(Math.min(hitCount,6));
  fireImpactRing();
  spawnSparks(4+Math.min(hitCount,6)*2);
  vibrate(hitResult.broken?[0,40,30,40,30,80]:30);

  const damagePct=100-Shield.getHpPercent(gs);
  const crackCount=Math.min(2+Math.floor(hitCount/1.5),5);
  const baseAngles=[-90,0,90,180,45,-45,135,-135];
  for(let i=0;i<crackCount;i++){
    spawnCrack(baseAngles[(hitCount*2+i)%baseAngles.length],14+damagePct*0.5);
  }
  tintShield(damagePct);

  if(hitResult.broken){
    broken=true;
    document.getElementById('hint').classList.remove('blinking');
    document.getElementById('hint').style.opacity='0';
    flashScreen();
    shakeScreen(9);
    vibrate([0,50,40,50,40,120]);
    setTimeout(()=>{ spawnShards(30); spawnSparks(22); },80);
    setTimeout(()=>{
      document.getElementById('main-content').style.display='none';
      const bs=document.getElementById('broken-screen');bs.style.display='flex';

      let ritualResult;
      gs=GameState.set(state=>{ ritualResult=Shield.completeRitual(state); });

      document.getElementById('b-streak-xp').textContent='+'+ritualResult.streakBonusXp+' XP';

      if(ritualResult.playerLeveledUp){
        document.getElementById('level-up-badge').innerHTML='<i class="ti ti-trophy" style="font-size:16px;color:var(--neon)"></i><span class="level-up-badge-text">Level '+ritualResult.newLevel+' reached</span>';
      }

      // Surface anything the ritual triggered beyond the base XP — this is
      // the part that was previously missing: breaking the seal could
      // silently unlock a skill or damage the boss with zero feedback.
      const extraNotes=[];
      if(ritualResult.newSkills.length) extraNotes.push(ritualResult.newSkills.length+' new skill unlocked');
      if(ritualResult.bossDefeated) extraNotes.push('Boss defeated!');
      else if(ritualResult.bossDamageDealt>0) extraNotes.push('Dealt '+ritualResult.bossDamageDealt+' boss damage');
      if(ritualResult.newAchievements.length) extraNotes.push(ritualResult.newAchievements.length+' achievement unlocked');
      if(extraNotes.length){
        document.getElementById('b-sub').innerHTML='Your day has begun, warrior.<br>'+extraNotes.join(' · ');
      }

      setTimeout(()=>document.getElementById('b-icon').classList.add('show'),60);
      setTimeout(()=>document.getElementById('b-title').classList.add('show'),220);
      setTimeout(()=>document.getElementById('b-sub').classList.add('show'),340);
      if(ritualResult.playerLeveledUp) setTimeout(()=>document.getElementById('level-up-badge').classList.add('show'),440);
      setTimeout(()=>document.getElementById('b-xp').classList.add('show'),560);
      setTimeout(()=>document.getElementById('b-btn').classList.add('show'),720);
    },420);
  }
}

function enterQuestBoard(){
  window.location.href='quests.html';
}
</script>
