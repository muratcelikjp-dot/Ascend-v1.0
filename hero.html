<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#00E5FF">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="RPG Self">

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ab:#020D18;--ab2:#04192E;--ab3:#071F38;
  --neon:#00E5FF;--oc:#00B4D8;--ocd:#005F87;
  --bd:rgba(0,180,216,0.18);--bd2:rgba(0,180,216,0.36);
  --tx:#C8EAF5;--txd:#4A7A90;--txm:#7BAFC8;
  --am:#EF9F27;--gr:#1D9E75;--co:#D85A30;--pk:#D4537E;--re:#E24B4A;--pu:#7F77DD;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--ab);display:flex;justify-content:center}
.app{max-width:390px;width:100%;background:var(--ab);min-height:100vh;padding-bottom:72px}

.banner{background:linear-gradient(180deg,var(--ab2),var(--ab));border-bottom:1px solid var(--bd);padding:20px 16px 16px;position:relative;overflow:hidden}
.scan{position:absolute;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--neon),transparent);animation:sc 3s linear infinite;opacity:.22;pointer-events:none}
@keyframes sc{0%{top:0}100%{top:110%}}
.bn-top{display:flex;align-items:center;gap:14px;position:relative}
.avatar-ring-wrap{position:relative;width:72px;height:72px;flex-shrink:0}
.avatar-ring-svg{position:absolute;inset:0;transform:rotate(-90deg)}
.avatar-ring-bg{fill:none;stroke:var(--ab3);stroke-width:4}
.avatar-ring-fill{fill:none;stroke:var(--neon);stroke-width:4;stroke-linecap:round;transition:stroke-dashoffset 1s cubic-bezier(.4,0,.2,1)}
.avatar{position:absolute;top:8px;left:8px;width:56px;height:56px;border-radius:50%;background:var(--ab3);border:1px solid var(--oc);display:flex;align-items:center;justify-content:center;font-size:26px}
.bn-name{font-size:17px;font-weight:500;color:var(--neon);letter-spacing:.05em}
.bn-class{font-size:10px;color:var(--txd);margin-top:2px;text-transform:uppercase;letter-spacing:.1em}
.bn-title-earned{font-size:10px;color:var(--am);margin-top:2px;font-style:italic}
.bn-right{margin-left:auto;display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.pill-lvl{background:var(--ab3);color:var(--neon);font-size:10px;padding:2px 9px;border:1px solid var(--ocd);border-radius:2px;letter-spacing:.08em}
.pill-streak{background:rgba(239,159,39,.1);color:var(--am);font-size:10px;padding:2px 9px;border:1px solid rgba(239,159,39,.28);border-radius:2px;letter-spacing:.05em}
.xp-wrap{margin-top:14px;position:relative}
.xp-lbl{display:flex;justify-content:space-between;font-size:10px;color:var(--txd);margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em}
.xp-track{height:3px;background:var(--ab3)}
.xp-fill{height:100%;background:var(--neon);transition:width .7s cubic-bezier(.4,0,.2,1)}

.activity-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px 16px 0}
.activity-card{background:var(--ab2);border:1px solid var(--bd);border-radius:4px;padding:10px 12px;display:flex;gap:9px;align-items:center}
.activity-icon{width:28px;height:28px;border-radius:2px;background:rgba(0,229,255,.08);border:1px solid rgba(0,229,255,.2);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.activity-icon i{font-size:13px;color:var(--neon)}
.activity-icon.empty{background:var(--ab3);border-color:var(--bd2)}
.activity-icon.empty i{color:var(--txd)}
.activity-body{flex:1;min-width:0}
.activity-lbl{font-size:8.5px;color:var(--txd);text-transform:uppercase;letter-spacing:.06em}
.activity-val{font-size:11px;color:var(--tx);margin-top:1px;line-height:1.3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.boss-summary-card{margin:8px 16px 0;background:var(--ab2);border:1px solid rgba(226,75,74,.25);border-radius:4px;padding:11px 13px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:border-color .15s}
.boss-summary-card:hover{border-color:rgba(226,75,74,.5)}
.boss-summary-icon{width:30px;height:30px;border-radius:50%;background:rgba(226,75,74,.1);border:1px solid var(--re);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.boss-summary-icon i{font-size:14px;color:#F09595}
.boss-summary-body{flex:1;min-width:0}
.boss-summary-name{font-size:11px;color:var(--tx)}
.boss-summary-bar-bg{height:4px;background:var(--ab3);border-radius:2px;margin-top:5px;overflow:hidden}
.boss-summary-bar-fill{height:100%;background:var(--re);border-radius:2px;transition:width .8s ease}
.boss-summary-pct{font-size:10px;color:#F09595;font-weight:500;flex-shrink:0}

.summary-row{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:1px;background:var(--bd);border-bottom:1px solid var(--bd);margin-top:12px}
.sum-cell{background:var(--ab2);padding:10px 8px;text-align:center;cursor:pointer;transition:background .15s}
.sum-cell:hover{background:var(--ab3)}
.sum-num{font-size:18px;font-weight:500;color:var(--tx)}
.sum-lbl{font-size:9px;color:var(--txd);margin-top:2px;text-transform:uppercase;letter-spacing:.06em}

.prestige-card{margin:10px 16px 0;background:var(--ab2);border:1px solid rgba(127,119,221,.3);border-radius:4px;padding:13px 14px}
.prestige-card.eligible{border-color:var(--pu);background:linear-gradient(135deg,var(--ab2),rgba(127,119,221,.08))}
.prestige-top{display:flex;align-items:center;gap:9px;margin-bottom:8px}
.prestige-icon{width:28px;height:28px;border-radius:50%;background:rgba(127,119,221,.12);border:1px solid var(--pu);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.prestige-icon i{font-size:14px;color:var(--pu)}
.prestige-title{font-size:12px;font-weight:500;color:var(--tx)}
.prestige-sub{font-size:10px;color:var(--txd);margin-top:1px}
.prestige-bar-bg{height:4px;background:var(--ab3);border-radius:2px;overflow:hidden}
.prestige-bar-fill{height:100%;background:var(--pu);border-radius:2px;transition:width .8s ease}
.prestige-btn{margin-top:10px;width:100%;padding:9px;background:var(--pu);border:none;border-radius:2px;color:#fff;font-size:11px;font-weight:500;cursor:pointer;text-transform:uppercase;letter-spacing:.06em}
.prestige-btn:hover{opacity:.9}
.prestige-count-badge{font-size:10px;color:var(--pu);background:rgba(127,119,221,.12);border:1px solid rgba(127,119,221,.3);padding:2px 8px;border-radius:2px;margin-left:auto}

.confirm-overlay{position:fixed;inset:0;background:rgba(2,13,24,.9);display:none;align-items:center;justify-content:center;z-index:70;padding:24px;max-width:390px;margin:0 auto}
.confirm-overlay.show{display:flex}
.confirm-card{background:var(--ab2);border:1px solid var(--pu);border-radius:6px;padding:22px}
.confirm-title{font-size:14px;font-weight:600;color:var(--pu);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;text-align:center}
.confirm-body{font-size:12px;color:var(--txd);line-height:1.6;margin-bottom:14px}
.confirm-body strong{color:var(--tx)}
.confirm-acts{display:flex;gap:8px}
.confirm-cancel{flex:1;padding:10px;border:1px solid var(--bd);border-radius:2px;background:transparent;color:var(--txd);font-size:10px;cursor:pointer;text-transform:uppercase;letter-spacing:.06em}
.confirm-ok{flex:1;padding:10px;border:none;border-radius:2px;background:var(--pu);color:#fff;font-size:10px;font-weight:500;cursor:pointer;text-transform:uppercase;letter-spacing:.06em}

@keyframes achPopIn{0%{opacity:0;transform:scale(.7) translateY(10px)}60%{transform:scale(1.05) translateY(0)}100%{opacity:1;transform:scale(1) translateY(0)}}
@keyframes achGlow{0%,100%{box-shadow:0 0 20px rgba(239,159,39,.15)}50%{box-shadow:0 0 32px rgba(239,159,39,.35)}}
.ach-popup-overlay{position:fixed;inset:0;background:rgba(2,13,24,.8);display:none;align-items:center;justify-content:center;z-index:80;padding:24px;max-width:390px;margin:0 auto}
.ach-popup-overlay.show{display:flex}
.ach-popup-card{background:var(--ab2);border:1px solid rgba(239,159,39,.4);border-radius:6px;padding:24px;text-align:center;animation:achPopIn .45s cubic-bezier(.34,1.56,.64,1),achGlow 2s ease-in-out infinite}
.ach-popup-label{font-size:10px;color:var(--am);text-transform:uppercase;letter-spacing:.14em;margin-bottom:12px}
.ach-popup-icon{width:64px;height:64px;border-radius:50%;background:rgba(239,159,39,.12);border:2px solid var(--am);display:flex;align-items:center;justify-content:center;font-size:30px;color:var(--am);margin:0 auto 14px}
.ach-popup-name{font-size:16px;font-weight:600;color:var(--tx)}
.ach-popup-desc{font-size:11px;color:var(--txd);margin-top:6px;line-height:1.5}
.ach-popup-close{margin-top:18px;padding:9px 28px;background:var(--am);border:none;border-radius:4px;color:var(--ab);font-size:10px;font-weight:500;cursor:pointer;text-transform:uppercase;letter-spacing:.07em}

.attr-tabs{display:flex;background:var(--ab2);border-bottom:1px solid var(--bd);overflow-x:auto}
.attr-tabs::-webkit-scrollbar{display:none}
.a-tab{padding:10px 12px;font-size:10px;color:var(--txd);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;text-transform:uppercase;letter-spacing:.07em;display:flex;align-items:center;gap:5px;transition:all .15s;flex-shrink:0}
.a-tab i{font-size:13px}
.a-tab.active{color:var(--neon);border-bottom-color:var(--neon)}
.a-tab:hover:not(.active){color:var(--txm)}

.attr-bar-row{background:var(--ab2);border-bottom:1px solid var(--bd);padding:10px 16px}
.ab-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
.ab-name{font-size:13px;font-weight:500;color:var(--neon);letter-spacing:.04em;text-transform:uppercase}
.ab-lv{font-size:11px;color:var(--txm)}
.ab-bar{height:3px;background:var(--ab3)}
.ab-fill{height:100%;transition:width .8s cubic-bezier(.4,0,.2,1)}

.skill-tree-wrap{padding:14px 16px 8px}
.skill-node-row{display:flex;flex-direction:column;align-items:center}
.skill-connector{width:2px;height:16px;background:var(--bd2)}
.skill-connector.active{background:var(--neon)}
.skill-card{width:100%;background:var(--ab2);border:1px solid var(--bd);border-radius:4px;padding:12px 14px;display:flex;gap:10px;align-items:center;transition:opacity .2s,border-color .2s,transform .15s;cursor:pointer}
.skill-card:active{transform:scale(.98)}
.skill-card.locked{opacity:.45}
.skill-card.unlocked{border-color:rgba(0,229,255,.35)}
.skill-icon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:var(--ab3);border:1.5px solid var(--bd2);position:relative}
.skill-card.unlocked .skill-icon{background:rgba(0,229,255,.12);border-color:var(--neon)}
.skill-icon i{font-size:16px;color:var(--txd)}
.skill-card.unlocked .skill-icon i{color:var(--neon)}
.skill-tier-badge{position:absolute;top:-4px;right:-4px;width:14px;height:14px;border-radius:50%;background:var(--ab);border:1px solid var(--bd2);display:flex;align-items:center;justify-content:center;font-size:8px;color:var(--txd)}
.skill-card.unlocked .skill-tier-badge{border-color:var(--neon);color:var(--neon)}
.skill-body{flex:1;min-width:0}
.skill-name{font-size:13px;font-weight:500;color:var(--tx)}
.skill-req{font-size:10px;color:var(--txd);text-transform:uppercase;letter-spacing:.05em;margin-top:1px}
.skill-card.unlocked .skill-req{color:var(--gr)}
.skill-bonus-tag{display:inline-block;margin-top:4px;font-size:9px;color:var(--am);background:rgba(239,159,39,.1);border:1px solid rgba(239,159,39,.25);padding:1px 6px;border-radius:2px}
.skill-chevron{font-size:14px;color:var(--txd);flex-shrink:0}

@keyframes skillUnlockPop{0%{transform:scale(1)}40%{transform:scale(1.08)}100%{transform:scale(1)}}
@keyframes skillUnlockGlow{0%{box-shadow:0 0 0 0 rgba(0,229,255,0)}30%{box-shadow:0 0 0 6px rgba(0,229,255,.25)}100%{box-shadow:0 0 0 0 rgba(0,229,255,0)}}
.skill-card.just-unlocked{animation:skillUnlockPop .5s ease,skillUnlockGlow 1.1s ease}

.detail-overlay{position:fixed;inset:0;background:rgba(2,13,24,.85);display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;z-index:30}
.detail-overlay.open{opacity:1;pointer-events:all}
.detail-sheet{width:390px;background:var(--ab2);border-top:1px solid var(--bd2);padding:22px 18px 36px;transform:translateY(100%);transition:transform .25s ease}
.detail-overlay.open .detail-sheet{transform:translateY(0)}
.detail-top{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.detail-icon{width:48px;height:48px;border-radius:50%;background:rgba(0,229,255,.1);border:1.5px solid var(--neon);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.detail-icon i{font-size:22px;color:var(--neon)}
.detail-icon.locked{background:var(--ab3);border-color:var(--bd2)}
.detail-icon.locked i{color:var(--txd)}
.detail-name{font-size:15px;font-weight:500;color:var(--tx)}
.detail-status{font-size:10px;text-transform:uppercase;letter-spacing:.06em;margin-top:2px}
.detail-status.unlocked{color:var(--gr)}
.detail-status.locked{color:var(--am)}
.detail-desc{font-size:12px;color:var(--txd);line-height:1.65;margin-bottom:14px}
.detail-bonus-card{background:var(--ab3);border:1px solid rgba(239,159,39,.25);border-radius:4px;padding:11px 13px;display:flex;align-items:center;gap:10px;margin-bottom:14px}
.detail-bonus-icon{width:28px;height:28px;border-radius:2px;background:rgba(239,159,39,.12);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.detail-bonus-icon i{font-size:14px;color:var(--am)}
.detail-bonus-text{font-size:11px;color:var(--tx)}
.detail-bonus-text strong{color:var(--am)}
.detail-close{width:100%;padding:11px;border:1px solid var(--bd2);border-radius:4px;background:transparent;color:var(--txd);font-size:11px;cursor:pointer;text-transform:uppercase;letter-spacing:.07em}
.detail-close:hover{border-color:var(--neon);color:var(--neon)}

.nav{display:flex;justify-content:space-around;padding:10px 0 20px;background:var(--ab2);border-top:1px solid var(--bd);position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:390px;z-index:10}
.ni{display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 6px;text-decoration:none;transition:transform .12s}
.ni:active{transform:scale(.88)}
.ni i{font-size:21px;color:var(--txd)}
.ni.on i{color:var(--neon)}
.ni span{font-size:9px;color:var(--txd);text-transform:uppercase;letter-spacing:.07em}
.ni.on span{color:var(--neon)}
</style>
</head>

<div id="global-error-banner" style="display:none;position:fixed;top:0;left:0;right:0;background:#5a1010;color:#ffdede;padding:12px 14px;font-family:monospace;font-size:11px;z-index:99999;max-height:40vh;overflow-y:auto;white-space:pre-wrap;border-bottom:2px solid #ff4444"></div>
<script>
window.addEventListener('error', function(e){
  var isOpaqueScriptError=e.message==='Script error.'&&(!e.filename)&&(!e.lineno)&&(!e.colno);
  if(isOpaqueScriptError) return;
  var banner=document.getElementById('global-error-banner');
  if(banner){
    banner.style.display='block';
    banner.textContent += '[JS ERROR] '+e.message+'\n  at '+e.filename+':'+e.lineno+':'+e.colno+'\n\n';
  }
});
</script>

<script>
const ATTR_META=[
  {id:'intelligence',label:'Intelligence',icon:'ti-book',col:'#00E5FF'},
  {id:'strength',    label:'Strength',    icon:'ti-run',col:'#1D9E75'},
  {id:'charisma',    label:'Charisma',    icon:'ti-messages',col:'#D4537E'},
  {id:'discipline',  label:'Discipline',  icon:'ti-clock',col:'#EF9F27'},
  {id:'creativity',  label:'Creativity',  icon:'ti-palette',col:'#D85A30'},
  {id:'willpower',   label:'Willpower',   icon:'ti-flame',col:'#E24B4A'},
];

GameLoop.bootstrapDay();
let gs=GameState.get();
let activeAttr='intelligence';

function renderHeader(){
  const progress=Leveling.progressWithinLevel(gs.xp);
  const pct=Math.round((progress.xpIntoLevel/Math.max(1,progress.xpNeededForLevel))*100);
  document.getElementById('xp-fill').style.width=pct+'%';
  document.getElementById('xp-txt').textContent=progress.xpIntoLevel+' / '+progress.xpNeededForLevel;
  document.getElementById('h-lvl').textContent='LVL '+String(gs.level).padStart(2,'0');
  document.getElementById('h-class').textContent=Ranks.getRankForLevel(gs.level).toUpperCase();
  const allTitles=Ranks.getAllEarnedTitles(gs);
  document.getElementById('h-title-earned').textContent=allTitles.length>0?'"'+allTitles[allTitles.length-1].name+'"':'';
  document.getElementById('h-streak').innerHTML='<i class="ti ti-flame" style="font-size:10px"></i> '+gs.streak+'-day streak';

  // Level-progress ring around the avatar: circumference for r=32 is
  // 2*PI*32 ≈ 201, matching the stroke-dasharray set in the markup.
  const circumference=201;
  const ringFill=document.getElementById('avatar-ring-fill');
  ringFill.style.strokeDashoffset=String(circumference-(pct/100)*circumference);
}

// Finds the most recently unlocked skill across ALL attributes (not just
// the currently active tab) by scanning every skill tree for ids present
// in state.skills.unlocked, in the order they were pushed (chronological,
// since checkAndUnlock always appends). Returns null if nothing unlocked yet.
function findLastUnlockedSkill(){
  if(!gs.skills.unlocked.length) return null;
  const lastId=gs.skills.unlocked[gs.skills.unlocked.length-1];
  for(const attrId of Object.keys(SEED_DATA.skillTree)){
    const found=SEED_DATA.skillTree[attrId].find(s=>s.id===lastId);
    if(found) return {...found, attrId};
  }
  return null;
}

function findLastAchievement(){
  if(!gs.achievements.unlocked.length) return null;
  const lastId=gs.achievements.unlocked[gs.achievements.unlocked.length-1];
  return SEED_DATA.achievements.find(a=>a.id===lastId)||null;
}

function renderRecentActivity(){
  const lastSkill=findLastUnlockedSkill();
  const lastAch=findLastAchievement();

  const skillCard=lastSkill
    ?`<div class="activity-card">
        <div class="activity-icon"><i class="ti ${lastSkill.icon||'ti-bolt'}"></i></div>
        <div class="activity-body"><div class="activity-lbl">Latest skill</div><div class="activity-val">${lastSkill.name}</div></div>
      </div>`
    :`<div class="activity-card">
        <div class="activity-icon empty"><i class="ti ti-bolt"></i></div>
        <div class="activity-body"><div class="activity-lbl">Latest skill</div><div class="activity-val">None yet</div></div>
      </div>`;

  const achCard=lastAch
    ?`<div class="activity-card">
        <div class="activity-icon"><i class="ti ti-medal"></i></div>
        <div class="activity-body"><div class="activity-lbl">Latest achievement</div><div class="activity-val">${lastAch.name}</div></div>
      </div>`
    :`<div class="activity-card">
        <div class="activity-icon empty"><i class="ti ti-medal"></i></div>
        <div class="activity-body"><div class="activity-lbl">Latest achievement</div><div class="activity-val">None yet</div></div>
      </div>`;

  document.getElementById('activity-row').innerHTML=skillCard+achCard;
}

function renderBossSummary(){
  const progress=Bosses.getBossProgress(gs);
  const card=document.getElementById('boss-summary-card');
  if(!progress){
    card.innerHTML=`
      <div class="boss-summary-icon"><i class="ti ti-crown"></i></div>
      <div class="boss-summary-body"><div class="boss-summary-name">Campaign complete — all bosses defeated</div></div>`;
    return;
  }
  card.innerHTML=`
    <div class="boss-summary-icon"><i class="ti ${progress.icon||'ti-skull'}"></i></div>
    <div class="boss-summary-body">
      <div class="boss-summary-name">Active threat: ${progress.name}</div>
      <div class="boss-summary-bar-bg"><div class="boss-summary-bar-fill" style="width:${progress.pct}%"></div></div>
    </div>
    <div class="boss-summary-pct">${progress.pct}%</div>`;
}

function renderSummary(){
  document.getElementById('s-achievements').textContent=gs.achievements.unlocked.length;
  document.getElementById('s-bosses').textContent=gs.bosses.defeated.length;
  document.getElementById('s-skills').textContent=Skills.getTotalUnlockedCount(gs);
}

function renderPrestigeCard(){
  const card=document.getElementById('prestige-card');
  const eligible=Prestige.canPrestige(gs);
  const threshold=SEED_DATA.prestigeConfig.levelThreshold;
  const prestigeData=gs.prestige||{count:0,permanentXpBonus:0};
  const bonusPct=Math.round((prestigeData.permanentXpBonus||0)*100);

  if(eligible){
    card.innerHTML=`
      <div class="prestige-card eligible">
        <div class="prestige-top">
          <div class="prestige-icon"><i class="ti ti-infinity"></i></div>
          <div><div class="prestige-title">Ready to Ascend</div><div class="prestige-sub">Reset level & attributes for a permanent XP bonus</div></div>
          ${prestigeData.count>0?`<div class="prestige-count-badge">×${prestigeData.count}</div>`:''}
        </div>
        <button class="prestige-btn" onclick="openPrestigeConfirm()">Ascend now</button>
      </div>`;
  }else{
    const pct=Math.min(100,Math.round((gs.level/threshold)*100));
    card.innerHTML=`
      <div class="prestige-card">
        <div class="prestige-top">
          <div class="prestige-icon"><i class="ti ti-infinity"></i></div>
          <div><div class="prestige-title">Prestige — Level ${gs.level} / ${threshold}</div><div class="prestige-sub">${bonusPct>0?'Current bonus: +'+bonusPct+'% XP':'Unlocks a permanent XP bonus at level '+threshold}</div></div>
        </div>
        <div class="prestige-bar-bg"><div class="prestige-bar-fill" style="width:${pct}%"></div></div>
      </div>`;
  }
}

function openPrestigeConfirm(){
  const nextBonus=Math.round((gs.prestige.permanentXpBonus+SEED_DATA.prestigeConfig.xpBonusPerPrestige)*100);
  document.getElementById('prestige-confirm-body').innerHTML=
    `Your level and attribute levels will reset to 1. <strong>Skills, achievements, boss defeats, titles, and rewards are permanently kept.</strong><br><br>
     You'll gain a permanent XP bonus, bringing your total to <strong>+${nextBonus}%</strong> forever.<br><br>
     This cannot be undone. Ascend?`;
  document.getElementById('prestige-confirm').classList.add('show');
}

function closePrestigeConfirm(){
  document.getElementById('prestige-confirm').classList.remove('show');
}

function doPrestigeConfirmed(){
  let result;
  gs=GameState.set(state=>{ result=Prestige.doPrestige(state); });
  closePrestigeConfirm();
  refreshAll();
  if(result&&result.newAchievements.length){
    result.newAchievements.forEach(a=>showAchievementPopup(a));
  }
}

let achievementQueue=[];
let achievementPopupShowing=false;
function showAchievementPopup(def){
  achievementQueue.push(def);
  if(!achievementPopupShowing) showNextAchievementPopup();
}
function showNextAchievementPopup(){
  if(achievementQueue.length===0){ achievementPopupShowing=false; return; }
  achievementPopupShowing=true;
  const def=achievementQueue.shift();
  document.getElementById('ach-popup-icon').innerHTML='<i class="ti '+(def.icon||'ti-medal')+'"></i>';
  document.getElementById('ach-popup-name').textContent=def.name;
  document.getElementById('ach-popup-desc').textContent=def.description;
  document.getElementById('ach-popup').classList.add('show');
}
function closeAchievementPopup(){
  document.getElementById('ach-popup').classList.remove('show');
  setTimeout(()=>showNextAchievementPopup(),250);
}

function renderTabs(){
  document.getElementById('attr-tabs').innerHTML=ATTR_META.map(a=>
    `<div class="a-tab${a.id===activeAttr?' active':''}" onclick="switchAttr('${a.id}')"><i class="ti ${a.icon}"></i>${a.label}</div>`
  ).join('');
}

function renderAttrBar(){
  const meta=ATTR_META.find(a=>a.id===activeAttr);
  const attr=gs.attributes[activeAttr];
  const progress=Leveling.progressWithinLevel(attr.xp);
  const pct=Math.round((progress.xpIntoLevel/Math.max(1,progress.xpNeededForLevel))*100);
  document.getElementById('ab-name').textContent=meta.label.toUpperCase();
  document.getElementById('ab-lv').textContent='Level '+attr.level+' ('+progress.xpIntoLevel+' / '+progress.xpNeededForLevel+' XP)';
  document.getElementById('ab-fill').style.width=pct+'%';
  document.getElementById('ab-fill').style.background=meta.col;
}

function renderSkills(){
  const skills=Skills.getAllForAttribute(gs,activeAttr);
  const meta=ATTR_META.find(a=>a.id===activeAttr);

  // Detect which skills are unlocked NOW but were not the last time this
  // page rendered this attribute's list — those get the unlock animation.
  // Tracked in a plain JS variable (not localStorage) since this only
  // needs to last for the current page session, not persist.
  const newlyUnlockedIds=skills.filter(s=>s.unlocked&&!lastSeenUnlocked[activeAttr]?.includes(s.id)).map(s=>s.id);
  lastSeenUnlocked[activeAttr]=skills.filter(s=>s.unlocked).map(s=>s.id);

  const wrap=document.getElementById('skill-tree-wrap');
  wrap.innerHTML=skills.map((s,i)=>{
    const justUnlocked=newlyUnlockedIds.includes(s.id);
    const connector=i>0?`<div class="skill-connector${skills[i-1].unlocked?' active':''}"></div>`:'';
    const bonusPct=s.passiveBonus?Math.round(s.passiveBonus.multiplier*100):0;
    return `${connector}
    <div class="skill-node-row">
      <div class="skill-card ${s.unlocked?'unlocked':'locked'}${justUnlocked?' just-unlocked':''}" onclick="openSkillDetail('${s.id}')">
        <div class="skill-icon" style="${s.unlocked?'border-color:'+meta.col+';background:'+meta.col+'22':''}">
          <i class="ti ${s.icon||'ti-bolt'}" style="${s.unlocked?'color:'+meta.col:''}"></i>
          <span class="skill-tier-badge">${s.tier||1}</span>
        </div>
        <div class="skill-body">
          <div class="skill-name">${s.name}</div>
          <div class="skill-req">${s.unlocked?'Unlocked':'Requires Lv '+s.requiredLevel}</div>
          ${s.unlocked&&bonusPct?`<span class="skill-bonus-tag">+${bonusPct}% ${meta.label} XP</span>`:''}
        </div>
        <i class="ti ti-chevron-right skill-chevron"></i>
      </div>
    </div>`;
  }).join('');
}

function openSkillDetail(skillId){
  const skills=Skills.getAllForAttribute(gs,activeAttr);
  const s=skills.find(x=>x.id===skillId);
  const meta=ATTR_META.find(a=>a.id===activeAttr);
  if(!s) return;

  const bonusPct=s.passiveBonus?Math.round(s.passiveBonus.multiplier*100):0;

  document.getElementById('detail-sheet').innerHTML=`
    <div class="detail-top">
      <div class="detail-icon ${s.unlocked?'':'locked'}" style="${s.unlocked?'border-color:'+meta.col+';background:'+meta.col+'1a':''}">
        <i class="ti ${s.icon||'ti-bolt'}" style="${s.unlocked?'color:'+meta.col:''}"></i>
      </div>
      <div>
        <div class="detail-name">${s.name}</div>
        <div class="detail-status ${s.unlocked?'unlocked':'locked'}">${s.unlocked?'Unlocked · Tier '+s.tier:'Locked · requires '+meta.label+' level '+s.requiredLevel}</div>
      </div>
    </div>
    <div class="detail-desc">${s.description}</div>
    ${bonusPct?`<div class="detail-bonus-card">
      <div class="detail-bonus-icon"><i class="ti ti-bolt"></i></div>
      <div class="detail-bonus-text">${s.unlocked?'Currently active: ':'Once unlocked, grants: '}<strong>+${bonusPct}% ${meta.label} XP</strong> on every matching quest, automatically.</div>
    </div>`:''}
    <button class="detail-close" onclick="closeSkillDetail()">Close</button>
  `;
  document.getElementById('detail-overlay').classList.add('open');
}

function closeSkillDetail(){
  document.getElementById('detail-overlay').classList.remove('open');
}

function bgCloseDetail(e){
  if(e.target===document.getElementById('detail-overlay')) closeSkillDetail();
}

function switchAttr(id){
  activeAttr=id;
  renderTabs();renderAttrBar();renderSkills();
}

function refreshAll(){
  gs=GameState.get();
  renderHeader();renderSummary();renderPrestigeCard();renderRecentActivity();renderBossSummary();renderTabs();renderAttrBar();renderSkills();
}

const lastSeenUnlocked={};
GameState.subscribe(()=>refreshAll());

refreshAll();
</script>
<script src="js/sw-register.js"></script>
</body>
</html>
