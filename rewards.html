<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--ab:#020D18;--ab2:#04192E;--ab3:#071F38;--neon:#00E5FF;--oc:#00B4D8;--ocd:#005F87;--bd:rgba(0,180,216,0.18);--bd2:rgba(0,180,216,0.36);--tx:#C8EAF5;--txd:#4A7A90;--am:#EF9F27;--gr:#1D9E75;--re:#E24B4A;--pu:#7F77DD}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--ab);display:flex;justify-content:center}
.app{max-width:390px;width:100%;background:var(--ab);min-height:100vh;padding-bottom:72px}
.banner{background:var(--ab2);border-bottom:1px solid var(--bd);padding:14px 16px;position:relative;overflow:hidden}
.scan{position:absolute;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--neon),transparent);animation:sc 3s linear infinite;opacity:.22;pointer-events:none}
@keyframes sc{0%{top:0}100%{top:110%}}
.bn-row{display:flex;align-items:center;justify-content:space-between;position:relative}
.bn-title{font-size:15px;font-weight:500;color:var(--neon);letter-spacing:.05em}
.bn-sub{font-size:10px;color:var(--txd);margin-top:2px;text-transform:uppercase;letter-spacing:.08em}
.pill-xp{background:var(--ab3);color:var(--am);font-size:11px;padding:4px 10px;border:1px solid rgba(239,159,39,.3);border-radius:2px;letter-spacing:.05em;display:flex;align-items:center;gap:5px}

.stats-row{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:1px;background:var(--bd);border-top:1px solid var(--bd);border-bottom:1px solid var(--bd)}
.s-cell{background:var(--ab2);padding:10px 8px;text-align:center}
.s-num{font-size:17px;font-weight:500;color:var(--tx)}
.s-lbl{font-size:9px;color:var(--txd);margin-top:2px;text-transform:uppercase;letter-spacing:.06em}

.cat-tabs{display:flex;gap:5px;padding:10px 16px;overflow-x:auto}
.cat-tabs::-webkit-scrollbar{display:none}
.cat-tab{padding:5px 11px;border-radius:2px;border:1px solid var(--bd);background:transparent;font-size:10px;color:var(--txd);cursor:pointer;white-space:nowrap;text-transform:uppercase;letter-spacing:.06em;transition:all .15s;flex-shrink:0;display:flex;align-items:center;gap:5px}
.cat-tab i{font-size:12px}
.cat-tab.on{background:rgba(0,180,216,.12);border-color:var(--oc);color:var(--neon)}

.sec-bar{padding:10px 16px 8px;display:flex;align-items:center;justify-content:space-between}
.sec-title{font-size:10px;color:var(--txd);text-transform:uppercase;letter-spacing:.1em}

.reward-list{padding:0 16px;display:flex;flex-direction:column;gap:8px}
.rw-card{background:var(--ab2);border:1px solid var(--bd);border-radius:4px;padding:13px 14px;display:flex;align-items:center;gap:12px;transition:border-color .15s,transform .15s;position:relative;overflow:hidden}
.rw-card.afford{border-color:rgba(29,158,117,.3)}
.rw-card.premium{border-color:rgba(127,119,221,.4);background:linear-gradient(135deg,var(--ab2),rgba(127,119,221,.06))}
.rw-card.locked{opacity:.55}
.rw-icon{width:34px;height:34px;border-radius:4px;background:var(--ab3);border:1px solid var(--bd2);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.rw-card.premium .rw-icon{background:rgba(127,119,221,.15);border-color:var(--pu)}
.rw-icon i{font-size:16px;color:var(--am)}
.rw-card.premium .rw-icon i{color:var(--pu)}
.rw-card.locked .rw-icon i{color:var(--txd)}
.rw-body{flex:1;min-width:0}
.rw-name{font-size:13px;color:var(--tx);display:flex;align-items:center;gap:6px}
.rw-premium-tag{font-size:8px;color:var(--pu);background:rgba(127,119,221,.15);border:1px solid rgba(127,119,221,.35);padding:1px 5px;border-radius:2px;text-transform:uppercase;letter-spacing:.05em}
.rw-cost{font-size:11px;color:var(--am);margin-top:3px;font-weight:500}
.rw-lock-msg{font-size:10px;color:var(--txd);margin-top:3px}
.rw-actions{display:flex;gap:6px;flex-shrink:0}
.rw-btn{width:28px;height:28px;border-radius:4px;border:1px solid var(--bd2);background:transparent;color:var(--txd);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .15s}
.rw-btn:hover{border-color:var(--neon);color:var(--neon)}
.rw-btn.buy{background:var(--oc);border-color:var(--oc);color:var(--ab);width:auto;padding:0 13px;font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.05em}
.rw-btn.buy:hover{background:var(--neon)}
.rw-btn.buy:disabled{background:var(--ab3);border-color:var(--bd);color:var(--txd);cursor:default}
.rw-btn.danger:hover{border-color:var(--re);color:#F09595}

@keyframes purchaseFlash{0%{background:rgba(29,158,117,0)}30%{background:rgba(29,158,117,.18)}100%{background:rgba(29,158,117,0)}}
.rw-card.purchased-flash{animation:purchaseFlash .8s ease}
.coin-burst{position:absolute;font-size:11px;font-weight:600;color:var(--am);pointer-events:none;opacity:0;right:14px;top:50%;text-transform:uppercase;letter-spacing:.04em}
.coin-burst.fire{animation:coinFloat .8s ease-out forwards}
@keyframes coinFloat{0%{opacity:0;transform:translateY(0) scale(.7)}20%{opacity:1;transform:translateY(-6px) scale(1.1)}100%{opacity:0;transform:translateY(-34px) scale(1)}}

.add-btn{margin:12px 16px 0;width:calc(100% - 32px);padding:11px;background:transparent;border:1px dashed var(--bd2);border-radius:4px;font-size:10px;color:var(--txd);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;text-transform:uppercase;letter-spacing:.08em;transition:all .15s}
.add-btn:hover{background:var(--ab3);border-color:var(--oc);color:var(--neon)}

.history-list{padding:0 16px;display:flex;flex-direction:column;gap:6px}
.hist-row{display:flex;justify-content:space-between;align-items:center;background:var(--ab2);border:1px solid var(--bd);border-radius:4px;padding:9px 12px}
.hist-name{font-size:12px;color:var(--txd)}
.hist-cost{font-size:11px;color:var(--re);font-weight:500}

.cat-breakdown-list{padding:0 16px;display:flex;flex-direction:column;gap:6px}
.cb-row{display:flex;align-items:center;gap:10px;background:var(--ab2);border:1px solid var(--bd);border-radius:4px;padding:9px 12px}
.cb-icon{width:24px;height:24px;border-radius:2px;background:var(--ab3);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cb-icon i{font-size:12px;color:var(--neon)}
.cb-label{flex:1;font-size:11px;color:var(--tx)}
.cb-stat{font-size:10px;color:var(--txd)}

.empty-state{margin:12px 16px 0;padding:20px;text-align:center;color:var(--txd);font-size:11px;font-style:italic;border:1px dashed var(--bd);border-radius:4px}
.toast{margin:10px 16px 0;border-radius:4px;padding:10px 14px;display:flex;align-items:center;gap:8px;max-height:0;overflow:hidden;opacity:0;transition:max-height .35s,opacity .35s}

@keyframes achPopIn{0%{opacity:0;transform:scale(.7) translateY(10px)}60%{transform:scale(1.05) translateY(0)}100%{opacity:1;transform:scale(1) translateY(0)}}
@keyframes achGlow{0%,100%{box-shadow:0 0 20px rgba(239,159,39,.15)}50%{box-shadow:0 0 32px rgba(239,159,39,.35)}}
.ach-popup-overlay{position:fixed;inset:0;background:rgba(2,13,24,.8);display:none;align-items:center;justify-content:center;z-index:60;padding:24px;max-width:390px;margin:0 auto}
.ach-popup-overlay.show{display:flex}
.ach-popup-card{background:var(--ab2);border:1px solid rgba(239,159,39,.4);border-radius:6px;padding:24px;text-align:center;animation:achPopIn .45s cubic-bezier(.34,1.56,.64,1),achGlow 2s ease-in-out infinite}
.ach-popup-label{font-size:10px;color:var(--am);text-transform:uppercase;letter-spacing:.14em;margin-bottom:12px}
.ach-popup-icon{width:64px;height:64px;border-radius:50%;background:rgba(239,159,39,.12);border:2px solid var(--am);display:flex;align-items:center;justify-content:center;font-size:30px;color:var(--am);margin:0 auto 14px}
.ach-popup-name{font-size:16px;font-weight:600;color:var(--tx)}
.ach-popup-desc{font-size:11px;color:var(--txd);margin-top:6px;line-height:1.5}
.ach-popup-close{margin-top:18px;padding:9px 28px;background:var(--am);border:none;border-radius:4px;color:var(--ab);font-size:10px;font-weight:500;cursor:pointer;text-transform:uppercase;letter-spacing:.07em}
.toast.show{max-height:50px;opacity:1}
.toast.ok{background:rgba(29,158,117,.1);border:1px solid rgba(29,158,117,.3)}
.toast.ok span{color:#5DCAA5}
.toast.fail{background:rgba(226,75,74,.1);border:1px solid rgba(226,75,74,.3)}
.toast.fail span{color:#F09595}
.toast span{font-size:11px;text-transform:uppercase;letter-spacing:.05em}
.nav{display:flex;justify-content:space-around;padding:10px 0 20px;background:var(--ab2);border-top:1px solid var(--bd);position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:390px;z-index:10}
.ni{display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 6px;text-decoration:none;transition:transform .12s}
.ni:active{transform:scale(.88)}
.ni i{font-size:20px;color:var(--txd)}
.ni.on i{color:var(--neon)}
.ni span{font-size:8.5px;color:var(--txd);text-transform:uppercase;letter-spacing:.05em}
.ni.on span{color:var(--neon)}
.modal-overlay{position:fixed;inset:0;background:rgba(2,13,24,.85);display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;z-index:20}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{width:390px;background:var(--ab2);border-top:1px solid var(--bd2);padding:18px 16px 40px;transform:translateY(100%);transition:transform .25s ease;max-height:80vh;overflow-y:auto}
.modal-overlay.open .modal{transform:translateY(0)}
.m-title{font-size:12px;font-weight:500;color:var(--neon);text-transform:uppercase;letter-spacing:.1em;margin-bottom:14px}
.m-lbl{font-size:10px;color:var(--txd);margin-bottom:4px;display:block;text-transform:uppercase;letter-spacing:.08em}
.m-input{width:100%;padding:9px 11px;font-size:13px;border:1px solid var(--bd2);border-radius:2px;background:var(--ab3);color:var(--tx);margin-bottom:11px;outline:none}
.m-input:focus{border-color:var(--neon)}
.m-cat-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:6px;margin-bottom:12px}
.m-cat-opt{padding:8px 6px;border-radius:2px;border:1px solid var(--bd);font-size:10px;text-align:center;cursor:pointer;color:var(--txd);display:flex;flex-direction:column;align-items:center;gap:3px}
.m-cat-opt i{font-size:14px}
.m-cat-opt.sel{border-color:var(--oc);background:rgba(0,180,216,.1);color:var(--neon)}
.m-toggle-row{display:flex;align-items:center;gap:8px;margin-bottom:14px;padding:9px 11px;background:var(--ab3);border-radius:2px}
.m-toggle{width:36px;height:20px;border-radius:10px;background:var(--ab);border:1px solid var(--bd2);position:relative;cursor:pointer;flex-shrink:0}
.m-toggle.on{background:rgba(127,119,221,.3);border-color:var(--pu)}
.m-toggle-dot{width:14px;height:14px;border-radius:50%;background:var(--txd);position:absolute;top:2px;left:2px;transition:all .2s}
.m-toggle.on .m-toggle-dot{background:var(--pu);left:18px}
.m-toggle-label{font-size:11px;color:var(--tx)}
.m-acts{display:flex;gap:7px}
.m-cancel{flex:1;padding:10px;border:1px solid var(--bd);border-radius:2px;background:transparent;font-size:10px;cursor:pointer;color:var(--txd);text-transform:uppercase;letter-spacing:.07em}
.m-ok{flex:2;padding:10px;border:none;background:var(--oc);border-radius:2px;color:var(--ab);font-size:10px;font-weight:500;cursor:pointer;text-transform:uppercase;letter-spacing:.07em;transition:background .15s}
.m-ok:hover{background:var(--neon)}

/* Abyss Reward Vault */
:root{color-scheme:dark;--abyss-black:#020713;--abyss-deep:#071326;--abyss-ocean:#091B2F;--abyss-rift:#0B2744;--abyss-blue:#2F9DFF;--abyss-aqua:#35F4E6;--abyss-cyan:#8DEFFF;--abyss-purple:#8B5CF6;--abyss-gold:#F7C948;--abyss-green:#41E6A4;--abyss-coral:#FF5C7A;--abyss-text:#EAF8FF;--abyss-soft:#A7C7D9;--abyss-muted:#6F8EA3;--abyss-border:rgba(141,239,255,.18);--ab:var(--abyss-black);--ab2:var(--abyss-deep);--ab3:var(--abyss-ocean);--neon:var(--abyss-aqua);--oc:var(--abyss-blue);--bd:var(--abyss-border);--bd2:rgba(141,239,255,.34);--tx:var(--abyss-text);--txd:var(--abyss-muted);--am:var(--abyss-gold);--gr:var(--abyss-green);--re:var(--abyss-coral);--pu:var(--abyss-purple)}
html{background:var(--abyss-black);overscroll-behavior:none}
body{min-height:100vh;color:var(--abyss-text);background:var(--abyss-black)}
body::before{content:"";position:fixed;inset:0;pointer-events:none;background:repeating-linear-gradient(118deg,transparent 0 72px,rgba(141,239,255,.024) 73px 74px),linear-gradient(160deg,rgba(247,201,72,.045),transparent 33%,rgba(139,92,246,.05) 75%,transparent)}
.reward-vault-shell{position:relative;isolation:isolate;width:100%;max-width:430px;min-height:100svh;padding:calc(16px + env(safe-area-inset-top,0px)) 16px calc(30px + env(safe-area-inset-bottom,0px));overflow:hidden;background:linear-gradient(180deg,rgba(2,7,19,.98),rgba(7,19,38,.94) 48%,rgba(2,7,19,.99))}
.reward-vault-shell::before{content:"";position:absolute;inset:0;z-index:-1;pointer-events:none;background:linear-gradient(90deg,transparent,rgba(247,201,72,.025),transparent),repeating-linear-gradient(0deg,transparent 0 25px,rgba(141,239,255,.016) 26px 27px)}
.vault-header{position:relative;display:grid;grid-template-columns:42px minmax(0,1fr) auto;align-items:center;gap:11px;padding-bottom:13px;margin-bottom:14px;border-bottom:1px solid rgba(141,239,255,.16)}
.vault-header::after{content:"";position:absolute;left:0;bottom:-1px;width:86px;height:1px;background:linear-gradient(90deg,var(--abyss-gold),transparent);box-shadow:0 0 10px rgba(247,201,72,.28)}
.vault-back{width:42px;height:42px;display:grid;place-items:center;color:var(--abyss-cyan);text-decoration:none;border:1px solid var(--abyss-border);border-radius:7px;background:rgba(10,28,48,.58);-webkit-tap-highlight-color:transparent}
.vault-back i{font-size:20px}.vault-back:active{transform:scale(.96)}
.vault-kicker{font-size:8px;color:var(--abyss-gold);text-transform:uppercase;letter-spacing:.16em}
.vault-heading h1{margin-top:3px;font-size:21px;line-height:1.1;font-weight:650;color:var(--abyss-text);letter-spacing:0}
.vault-security{display:flex;align-items:center;gap:5px;color:rgba(65,230,164,.74);font-size:8px;text-transform:uppercase;letter-spacing:.1em}.vault-security::before{content:"";width:5px;height:5px;border-radius:50%;background:var(--abyss-green);box-shadow:0 0 8px rgba(65,230,164,.65)}

.vault-balance{position:relative;overflow:hidden;display:flex;align-items:center;gap:13px;padding:15px;margin-bottom:18px;border:1px solid rgba(247,201,72,.25);border-radius:8px;background:linear-gradient(135deg,rgba(33,31,35,.78),rgba(10,28,48,.68));box-shadow:0 16px 38px rgba(0,0,0,.24),0 0 26px rgba(247,201,72,.06)}
.vault-balance::before{content:"";position:absolute;left:0;top:0;width:88px;height:1px;background:var(--abyss-gold);box-shadow:0 0 12px rgba(247,201,72,.5)}
.vault-balance::after{content:"";position:absolute;right:-24px;bottom:-34px;width:108px;height:108px;border:1px solid rgba(247,201,72,.08);border-radius:50%;box-shadow:0 0 0 17px rgba(247,201,72,.025),0 0 0 34px rgba(247,201,72,.012);pointer-events:none}
.balance-emblem{width:46px;height:46px;display:grid;place-items:center;flex:0 0 auto;border:1px solid rgba(247,201,72,.36);border-radius:7px;background:rgba(247,201,72,.07);color:var(--abyss-gold);box-shadow:inset 0 0 18px rgba(247,201,72,.035)}
.balance-emblem i{font-size:23px}.balance-copy{min-width:0;flex:1}.balance-label{font-size:8px;color:var(--abyss-muted);text-transform:uppercase;letter-spacing:.13em}.balance-value{display:flex;align-items:baseline;gap:7px;margin-top:3px}.balance-value strong{font-size:27px;line-height:1;color:var(--abyss-text);font-weight:650}.balance-value span{font-size:9px;color:var(--abyss-gold);letter-spacing:.1em}.balance-state{font-size:8px;color:rgba(141,239,255,.48);text-transform:uppercase;letter-spacing:.08em;text-align:right}

.vault-section-head{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;margin:0 1px 10px}.vault-section-kicker{display:flex;align-items:center;gap:6px;color:var(--abyss-gold);font-size:8px;text-transform:uppercase;letter-spacing:.14em}.vault-section-kicker i{font-size:14px}.vault-section-title{margin-top:4px;font-size:17px;color:var(--abyss-text);font-weight:600}.vault-section-status{color:var(--abyss-muted);font-size:8px;text-transform:uppercase;letter-spacing:.09em}
.cat-all{--cat-color:#35f4e6;--cat-rgb:53,244,230}.cat-entertainment{--cat-color:#ff5fa2;--cat-rgb:255,95,162}.cat-food{--cat-color:#ff9f43;--cat-rgb:255,159,67}.cat-shopping{--cat-color:#f7c948;--cat-rgb:247,201,72}.cat-rest{--cat-color:#9b8cff;--cat-rgb:155,140,255}.cat-social{--cat-color:#41e6a4;--cat-rgb:65,230,164}.cat-other{--cat-color:#4fa8ff;--cat-rgb:79,168,255}
.cat-tabs{display:flex;gap:6px;padding:0 0 12px;overflow-x:auto;scrollbar-width:none}.cat-tabs::-webkit-scrollbar{display:none}.cat-tab{min-width:58px;height:47px;padding:5px 8px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;border-radius:7px;border-color:rgba(var(--cat-rgb),.17);background:rgba(10,28,48,.48);color:rgba(var(--cat-rgb),.56);font-size:6.8px;letter-spacing:.04em}.cat-tab i{font-size:17px;color:var(--cat-color);opacity:.72;filter:drop-shadow(0 0 5px rgba(var(--cat-rgb),.12))}.cat-tab.on{border-color:rgba(var(--cat-rgb),.5);background:rgba(var(--cat-rgb),.08);color:var(--cat-color);box-shadow:0 0 16px rgba(var(--cat-rgb),.08)}.cat-tab.on i{opacity:1;filter:drop-shadow(0 0 6px rgba(var(--cat-rgb),.35))}
.reward-list{padding:0;gap:9px}.rw-card{display:grid;grid-template-columns:44px minmax(0,1fr);align-items:center;gap:0 11px;padding:12px;border-radius:8px;border-color:var(--abyss-border);background:linear-gradient(155deg,rgba(13,38,64,.74),rgba(7,19,38,.7));box-shadow:0 12px 28px rgba(0,0,0,.2),inset 0 1px rgba(255,255,255,.03);animation:rewardDeploy .38s cubic-bezier(.2,.72,.25,1) both;animation-delay:calc(var(--deploy-index,0) * 55ms)}
@keyframes rewardDeploy{0%{opacity:0;transform:translateY(-14px) scale(.985);filter:brightness(.72)}65%{opacity:1;filter:brightness(1.08)}100%{opacity:1;transform:translateY(0) scale(1);filter:brightness(1)}}
.rw-card::before{content:"";position:absolute;left:0;top:9px;bottom:9px;width:2px;border-radius:0 3px 3px 0;background:var(--cat-color);opacity:.7;box-shadow:0 0 9px rgba(var(--cat-rgb),.38)}

.rw-card.premium{border-color:rgba(var(--cat-rgb),.38);background:linear-gradient(145deg,rgba(var(--cat-rgb),.07),rgba(7,19,38,.74))}

px;font-weight:650}.rw-btn.buy i{font-size:13px}.rw-btn.buy:hover{background:linear-gradient(90deg,var(--abyss-aqua),var(--abyss-cyan))}.rw-btn.buy:disabled{background:rgba(10,28,48,.64);border-color:var(--abyss-border);color:var(--abyss-muted)}

.add-btn{margin:10px 0 0;width:100%;min-height:44px;border-style:solid;border-radius:6px;border-color:rgba(247,201,72,.25);background:rgba(247,201,72,.035);color:var(--abyss-gold);font-weight:600}.add-btn:hover{background:rgba(247,201,72,.07);border-color:rgba(247,201,72,.48);color:var(--abyss-gold)}

.vault-ledger{margin-top:17px;border-top:1px solid rgba(141,239,255,.14);border-bottom:1px solid rgba(141,239,255,.1)}.vault-ledger>summary{height:50px;display:flex;align-items:center;gap:8px;list-style:none;color:var(--abyss-soft);cursor:pointer;-webkit-tap-highlight-color:transparent}.vault-ledger>summary::-webkit-details-marker{display:none}.vault-ledger>summary>i:first-child{font-size:15px;color:var(--abyss-purple)}.vault-ledger>summary span{font-size:9px;text-transform:uppercase;letter-spacing:.12em}.vault-ledger-summary{margin-left:auto;color:var(--abyss-muted)!important;font-size:8px!important}.vault-ledger-chevron{font-size:14px;color:var(--abyss-muted);transition:transform .2s}.vault-ledger[open] .vault-ledger-chevron{transform:rotate(180deg)}.vault-ledger-body{padding:0 0 13px}.stats-row{margin:0 0 13px;gap:6px;background:transparent;border:0}.s-cell{padding:10px 5px;border:1px solid rgba(141,239,255,.12);border-radius:5px;background:rgba(10,28,48,.46)}.s-num{font-size:16px;color:var(--abyss-text)}.s-lbl{font-size:7px}.ledger-label{display:flex;align-items:center;gap:6px;margin:13px 1px 7px;color:var(--abyss-muted);font-size:8px;text-transform:uppercase;letter-spacing:.11em}.ledger-label i{font-size:13px;color:var(--abyss-purple)}.cat-breakdown-list,.history-list{padding:0;gap:6px}.cb-row,.hist-row{padding:9px 10px;border-radius:5px;border-color:rgba(141,239,255,.12);background:rgba(10,28,48,.42)}.cb-label{color:var(--abyss-soft)}
.ach-popup-overlay{max-width:430px}.modal-overlay{background:rgba(2,7,19,.86)}.modal{width:min(100%,430px);padding:20px 16px calc(28px + env(safe-area-inset-bottom,0px));border-color:rgba(247,201,72,.35);border-radius:10px 10px 0 0;background:linear-gradient(180deg,rgba(13,38,64,.99),var(--abyss-deep))}.m-title{color:var(--abyss-gold)}.m-input{border-radius:6px;background:rgba(2,7,19,.62)}.m-cat-opt,.m-toggle-row,.m-cancel,.m-ok{border-radius:6px}.m-ok{background:linear-gradient(90deg,var(--abyss-blue),var(--abyss-aqua))}

<body data-panel="rewards">
<div id="global-error-banner" style="display:none;position:fixed;top:0;left:0;right:0;background:#5a1010;color:#ffdede;padding:12px 14px;font-family:monospace;font-size:11px;z-index:99999;max-height:40vh;overflow-y:auto;white-space:pre-wrap;border-bottom:2px solid #ff4444"></div>
<script>
window.addEventListener('error', function(e){
  var isOpaqueScriptError=e.message==='Script error.'&&(!e.filename)&&(!e.lineno)&&(!e.colno);
  if(isOpaqueScriptError) return;
  var banner=document.getElementById('global-error-banner');
  if(banner){
    banner.style.display='block';
    banner.textContent += '[JS ERROR] '+e.message+'\n  at '+e.filename+':'+e.lineno+':'+e.colno+'\n\n';
  }
});
</script>

<div class="app reward-vault-shell panel-nav-shell">
  <header class="vault-header panel-nav-header" style="--panel-progress:80%">
    <a class="vault-back" href="index.html" aria-label="Return to command center"><i class="ti ti-home"></i></a>
    <div class="vault-heading">
      <div class="vault-kicker">Panel 04</div>
      <h1>Rewards</h1>
    </div>
    <div class="vault-security">Vault secure</div>
  </header>

  <section class="vault-balance">
    <div class="balance-emblem"><i class="ti ti-bolt"></i></div>
    <div class="balance-copy">
      <div class="balance-label">Available progression</div>
      <div class="balance-value"><strong id="xp-balance">0</strong><span>XP</span></div>
    </div>
    <div class="balance-state" id="balance-state">Vault scanning</div>
  </section>

  <div class="vault-section-head">
    <div>
      <div class="vault-section-kicker"><i class="ti ti-chest"></i>Vault inventory</div>
      <div class="vault-section-title">Available Rewards</div>
    </div>
    <div class="vault-section-status">Personal loot</div>
  </div>
  <div class="cat-tabs" id="cat-tabs"></div>
  <div class="reward-list" id="reward-list"></div>
  <button class="add-btn" onclick="openAddModal()"><i class="ti ti-plus"></i> Forge custom reward</button>

  <div class="toast" id="toast"><i class="ti ti-check" style="font-size:14px" id="toast-icon"></i><span id="toast-txt"></span></div>

  <details class="vault-ledger">
    <summary>
      <i class="ti ti-book-2"></i><span>Vault ledger</span>
      <span class="vault-ledger-summary">Spending · History</span>
      <i class="ti ti-chevron-down vault-ledger-chevron"></i>
    </summary>
    <div class="vault-ledger-body">
      <div class="stats-row">
        <div class="s-cell"><div class="s-num" id="s-spent">0</div><div class="s-lbl">XP spent</div></div>
        <div class="s-cell"><div class="s-num" id="s-purchases">0</div><div class="s-lbl">Purchases</div></div>
        <div class="s-cell"><div class="s-num" id="s-favcat">—</div><div class="s-lbl">Top category</div></div>
      </div>
      <div class="ledger-label"><i class="ti ti-chart-donut"></i>Spending by category</div>
      <div class="cat-breakdown-list" id="cat-breakdown-list"></div>
      <div class="ledger-label"><i class="ti ti-history"></i>Purchase history</div>
      <div class="history-list" id="history-list"></div>
    </div>
  </details>
</div>

<div class="ach-popup-overlay" id="ach-popup">
  <div class="ach-popup-card">
    <div class="ach-popup-label">Achievement unlocked</div>
    <div class="ach-popup-icon" id="ach-popup-icon"><i class="ti ti-medal"></i></div>
    <div class="ach-popup-name" id="ach-popup-name">—</div>
    <div class="ach-popup-desc" id="ach-popup-desc">—</div>
    <button class="ach-popup-close" onclick="closeAchievementPopup()">Continue</button>
  </div>
</div>

<div class="modal-overlay" id="modal" onclick="bgClose(event)">
  <div class="modal">
    <div class="m-title" id="modal-title">Add reward</div>
    <label class="m-lbl">Reward name</label>
    <input class="m-input" id="rw-name" placeholder="e.g. Watch anime episode" />
    <label class="m-lbl">XP cost</label>
    <input class="m-input" id="rw-cost" type="number" min="1" placeholder="e.g. 250" />
    <label class="m-lbl">Category</label>
    <div class="m-cat-grid" id="m-cat-grid"></div>
    <label class="m-lbl">Required level (lock until reached)</label>
    <input class="m-input" id="rw-level" type="number" min="1" value="1" />
    <div class="m-toggle-row">
      <div class="m-toggle" id="premium-toggle" onclick="togglePremium()"><div class="m-toggle-dot"></div></div>
      <div class="m-toggle-label">Premium reward (special highlight)</div>
    </div>
    <div class="m-acts">
      <button class="m-cancel" onclick="closeModal()">Cancel</button>
      <button class="m-ok" onclick="saveReward()">Save reward</button>
    </div>
  </div>
</div>

<script>
GameLoop.bootstrapDay();
let gs=GameState.get();
let editingRewardId=null;
let activeCategory='all';
let isPremiumToggle=false;
let selectedCategory='other';

function escapeRewardUi(value){
  return String(value==null?'':value).replace(/[&<>'"]/g,char=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[char]));
}

function renderBalance(){
  document.getElementById('xp-balance').textContent=gs.xp;
  const rewards=Rewards.getByCategory(gs,'all');
  const ready=rewards.filter(r=>!Rewards.isLocked(gs,r)&&gs.xp>=r.cost).length;
  const state=document.getElementById('balance-state');
  state.textContent=ready>0?`${ready} reward${ready===1?'':'s'} ready`:(rewards.length?'Gather more XP':'Vault empty');
}

function renderStats(){
  document.getElementById('s-spent').textContent=Rewards.getTotalXpSpent(gs);
  document.getElementById('s-purchases').textContent=gs.rewards.purchased.length;
  const breakdown=Rewards.getCategoryBreakdown(gs);
  const cats=Object.keys(breakdown);
  if(cats.length===0){
    document.getElementById('s-favcat').textContent='—';
  }else{
    const top=cats.reduce((a,b)=>breakdown[a].totalXp>breakdown[b].totalXp?a:b);
    const catMeta=SEED_DATA.rewardCategories.find(c=>c.id===top);
    document.getElementById('s-favcat').textContent=catMeta?catMeta.label:top;
  }
}

function renderCatTabs(){
  const tabs=[{id:'all',label:'All',icon:'ti-layout-grid'},...SEED_DATA.rewardCategories];
  document.getElementById('cat-tabs').innerHTML=tabs.map(c=>
    `<button class="cat-tab cat-${c.id}${activeCategory===c.id?' on':''}" onclick="setCategory('${c.id}')"><i class="ti ${c.icon}"></i>${c.label}</button>`
  ).join('');
}

function setCategory(id){
  activeCategory=id;
  renderCatTabs();renderRewards();
}

function renderRewards(){
  const rewards=Rewards.getByCategory(gs,activeCategory);
  const list=document.getElementById('reward-list');
  if(rewards.length===0){
    list.innerHTML='<div class="empty-state">No rewards in this category yet.</div>';
    return;
  }
  list.innerHTML=rewards.map((r,index)=>{
    const canAfford=gs.xp>=r.cost;
    const locked=Rewards.isLocked(gs,r);
    const progress=Math.min(100,Math.round((gs.xp/r.cost)*100));
    const remaining=Math.max(0,r.cost-gs.xp);
    const catMeta=SEED_DATA.rewardCategories.find(c=>c.id===r.category)||{icon:'ti-gift'};
    let cls=`rw-card cat-${r.category}`;
    if(r.isPremium) cls+=' premium';
    if(locked) cls+=' locked';
    else if(canAfford) cls+=' afford';

    return `<div class="${cls}" id="card-${r.id}" style="--deploy-index:${Math.min(index,8)}">
      <div class="rw-icon"><i class="ti ${locked?'ti-lock':catMeta.icon}"></i></div>
      <div class="rw-body">
        <div class="rw-name">${escapeRewardUi(r.name)}${r.isPremium?'<span class="rw-premium-tag">Premium</span>':''}</div>
        ${locked?`<div class="rw-lock-msg">Unlocks at level ${r.requiredLevel}</div>`:`
          <div class="rw-cost-line">
            <div class="rw-cost">${r.cost} XP</div>
            <div class="rw-readiness">${canAfford?'Redeem available':remaining+' XP remaining'}</div>
          </div>
          <div class="rw-progress" aria-hidden="true"><span class="rw-progress-fill" style="width:${progress}%"></span></div>`}
      </div>
      <div class="rw-actions">
        <button class="rw-btn" aria-label="Edit reward" title="Edit reward" onclick="openEditModal('${r.id}')"><i class="ti ti-pencil"></i></button>
        <button class="rw-btn danger" aria-label="Delete reward" title="Delete reward" onclick="removeReward('${r.id}')"><i class="ti ti-trash"></i></button>
        <button class="rw-btn buy" ${(canAfford&&!locked)?'':'disabled'} onclick="buyReward('${r.id}')">${locked?'<i class="ti ti-lock"></i> Locked':'<i class="ti ti-sparkles"></i> Redeem'}</button>
      </div>
    </div>`;
  }).join('');
}

function renderCategoryBreakdown(){
  const breakdown=Rewards.getCategoryBreakdown(gs);
  const cats=Object.keys(breakdown);
  const list=document.getElementById('cat-breakdown-list');
  if(cats.length===0){
    list.innerHTML='<div class="empty-state">No spending yet.</div>';
    return;
  }
  list.innerHTML=cats.sort((a,b)=>breakdown[b].totalXp-breakdown[a].totalXp).map(catId=>{
    const meta=SEED_DATA.rewardCategories.find(c=>c.id===catId)||{label:catId,icon:'ti-dots'};
    const d=breakdown[catId];
    return `<div class="cb-row">
      <div class="cb-icon"><i class="ti ${meta.icon}"></i></div>
      <div class="cb-label">${meta.label}</div>
      <div class="cb-stat">${d.count} buys · ${d.totalXp} XP</div>
    </div>`;
  }).join('');
}

function renderHistory(){
  const history=Rewards.getPurchaseHistory(gs).slice().reverse().slice(0,15);
  const list=document.getElementById('history-list');
  if(history.length===0){
    list.innerHTML='<div class="empty-state">No purchases yet.</div>';
    return;
  }
  list.innerHTML=history.map(h=>
    `<div class="hist-row"><span class="hist-name">${escapeRewardUi(h.rewardName)}</span><span class="hist-cost">-${h.cost} XP</span></div>`
  ).join('');
}

function renderAll(){
  renderBalance();renderStats();renderCatTabs();renderRewards();renderCategoryBreakdown();renderHistory();
}

let achievementQueue=[];
let achievementPopupShowing=false;

function showAchievementPopup(def){
  achievementQueue.push(def);
  if(!achievementPopupShowing) showNextAchievementPopup();
}
function showNextAchievementPopup(){
  if(achievementQueue.length===0){ achievementPopupShowing=false; return; }
  achievementPopupShowing=true;
  const def=achievementQueue.shift();
  document.getElementById('ach-popup-icon').innerHTML='<i class="ti '+(def.icon||'ti-medal')+'"></i>';
  document.getElementById('ach-popup-name').textContent=def.name;
  document.getElementById('ach-popup-desc').textContent=def.description;
  document.getElementById('ach-popup').classList.add('show');
}
function closeAchievementPopup(){
  document.getElementById('ach-popup').classList.remove('show');
  setTimeout(()=>showNextAchievementPopup(),250);
}

function vibrate(pattern){
  if(navigator.vibrate){
    try{ navigator.vibrate(pattern); }catch(e){ /* unsupported, fail silently */ }
  }
}

function buyReward(rewardId){
  const cardEl=document.getElementById('card-'+rewardId);
  let result;
  gs=GameState.set(state=>{ result=Rewards.purchaseReward(state,rewardId); });

  if(result.success){
    vibrate(40);
    showToast('ok','Purchased: '+result.reward.name);
    if(cardEl){
      cardEl.classList.add('purchased-flash');
      const burst=document.createElement('div');
      burst.className='coin-burst';
      burst.textContent='-'+result.reward.cost+' XP';
      cardEl.appendChild(burst);
      requestAnimationFrame(()=>burst.classList.add('fire'));
      setTimeout(()=>burst.remove(),850);
    }
    if(result.newAchievements&&result.newAchievements.length){
      result.newAchievements.forEach(a=>showAchievementPopup(a));
    }
  }else if(result.reason==='insufficient_xp'){
    showToast('fail','Need '+result.shortfall+' more XP');
  }else if(result.reason==='level_locked'){
    showToast('fail','Requires level '+result.requiredLevel);
  }
  setTimeout(()=>renderAll(),result.success?250:0);
}

function removeReward(rewardId){
  gs=GameState.set(state=>{ Rewards.deleteReward(state,rewardId); });
  renderAll();
}

function openAddModal(){
  editingRewardId=null;
  isPremiumToggle=false;
  document.getElementById('modal-title').textContent='Add reward';
  document.getElementById('rw-name').value='';
  document.getElementById('rw-cost').value='';
  document.getElementById('rw-level').value='1';
  document.getElementById('premium-toggle').classList.remove('on');
  renderCatGrid('other');
  document.getElementById('modal').classList.add('open');
}

function openEditModal(rewardId){
  const reward=Rewards.getAll(gs).find(r=>r.id===rewardId);
  if(!reward) return;
  editingRewardId=rewardId;
  isPremiumToggle=reward.isPremium;
  document.getElementById('modal-title').textContent='Edit reward';
  document.getElementById('rw-name').value=reward.name;
  document.getElementById('rw-cost').value=reward.cost;
  document.getElementById('rw-level').value=reward.requiredLevel;
  document.getElementById('premium-toggle').classList.toggle('on',reward.isPremium);
  renderCatGrid(reward.category);
  document.getElementById('modal').classList.add('open');
}

function renderCatGrid(selected){
  selectedCategory=selected;
  document.getElementById('m-cat-grid').innerHTML=SEED_DATA.rewardCategories.map(c=>
    `<div class="m-cat-opt cat-${c.id}${selectedCategory===c.id?' sel':''}" onclick="selectCategory('${c.id}')"><i class="ti ${c.icon}"></i>${c.label}</div>`
  ).join('');
}
function selectCategory(id){
  selectedCategory=id;
  renderCatGrid(id);
}

function togglePremium(){
  isPremiumToggle=!isPremiumToggle;
  document.getElementById('premium-toggle').classList.toggle('on',isPremiumToggle);
}

function closeModal(){document.getElementById('modal').classList.remove('open')}
function bgClose(e){if(e.target===document.getElementById('modal'))closeModal()}

function saveReward(){
  const name=document.getElementById('rw-name').value.trim();
  const cost=parseInt(document.getElementById('rw-cost').value,10);
  const requiredLevel=parseInt(document.getElementById('rw-level').value,10)||1;
  if(!name||!cost||cost<=0) return;

  gs=GameState.set(state=>{
    if(editingRewardId){
      Rewards.editReward(state,editingRewardId,{name,cost,category:selectedCategory,requiredLevel,isPremium:isPremiumToggle});
    }else{
      Rewards.addReward(state,{name,cost,category:selectedCategory,requiredLevel,isPremium:isPremiumToggle});
    }
  });
  closeModal();
  renderAll();
}

function showToast(type,msg){
  const t=document.getElementById('toast');
  t.className='toast show '+type;
  document.getElementById('toast-icon').className='ti '+(type==='ok'?'ti-check':'ti-x');
  document.getElementById('toast-txt').textContent=msg;
  setTimeout(()=>t.classList.remove('show'),2600);
}

renderAll();
</script>
<script src="js/panel-navigation.js"></script>
<script src="js/app-version.js"></script>
