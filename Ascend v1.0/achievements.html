<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RPG — Achievements</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--ab:#020D18;--ab2:#04192E;--ab3:#071F38;--neon:#00E5FF;--oc:#00B4D8;--ocd:#005F87;--bd:rgba(0,180,216,0.18);--bd2:rgba(0,180,216,0.36);--tx:#C8EAF5;--txd:#4A7A90;--am:#EF9F27;--gr:#1D9E75;--re:#E24B4A}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--ab);display:flex;justify-content:center}
.app{max-width:390px;width:100%;background:var(--ab);min-height:100vh;padding-bottom:30px}
.banner{background:var(--ab2);border-bottom:1px solid var(--bd);padding:14px 16px;position:relative;overflow:hidden;display:flex;align-items:center;gap:10px}
.scan{position:absolute;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--neon),transparent);animation:sc 3s linear infinite;opacity:.22;pointer-events:none}
@keyframes sc{0%{top:0}100%{top:110%}}
.back-btn{width:30px;height:30px;border-radius:4px;border:1px solid var(--bd2);background:transparent;color:var(--txd);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;text-decoration:none;position:relative;z-index:2}
.back-btn:hover{border-color:var(--neon);color:var(--neon)}
.bn-title{font-size:15px;font-weight:500;color:var(--neon);letter-spacing:.05em;position:relative;z-index:2}
.bn-sub{font-size:10px;color:var(--txd);margin-top:2px;text-transform:uppercase;letter-spacing:.08em}

.progress-summary{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--ab2);border-bottom:1px solid var(--bd)}
.progress-ring-wrap{position:relative;width:54px;height:54px;flex-shrink:0}
.progress-ring-svg{transform:rotate(-90deg)}
.progress-ring-bg{fill:none;stroke:var(--ab3);stroke-width:4}
.progress-ring-fill{fill:none;stroke:var(--am);stroke-width:4;stroke-linecap:round;transition:stroke-dashoffset 1s ease}
.progress-ring-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--am)}
.progress-summary-label{font-size:11px;color:var(--tx)}
.progress-summary-sub{font-size:10px;color:var(--txd);margin-top:2px}

.cat-tabs{display:flex;gap:5px;padding:10px 16px;overflow-x:auto}
.cat-tabs::-webkit-scrollbar{display:none}
.cat-tab{padding:5px 11px;border-radius:2px;border:1px solid var(--bd);background:transparent;font-size:10px;color:var(--txd);cursor:pointer;white-space:nowrap;text-transform:uppercase;letter-spacing:.06em;transition:all .15s;flex-shrink:0;display:flex;align-items:center;gap:5px}
.cat-tab i{font-size:12px}
.cat-tab.on{background:rgba(0,180,216,.12);border-color:var(--oc);color:var(--neon)}

.ach-list{padding:6px 16px 16px;display:flex;flex-direction:column;gap:8px}
.ach-card{background:var(--ab2);border:1px solid var(--bd);border-radius:4px;padding:12px 14px;display:flex;gap:12px;align-items:center;transition:opacity .2s,border-color .2s}
.ach-card.locked{opacity:.45}
.ach-card.unlocked{border-color:rgba(239,159,39,.4)}
.ach-card.secret-locked{opacity:.35;border-style:dashed}
.ach-icon{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:var(--ab3);border:1.5px solid var(--bd2)}
.ach-card.unlocked .ach-icon{background:rgba(239,159,39,.12);border-color:var(--am)}
.ach-icon i{font-size:17px;color:var(--txd)}
.ach-card.unlocked .ach-icon i{color:var(--am)}
.ach-body{flex:1;min-width:0}
.ach-name{font-size:13px;font-weight:500;color:var(--tx)}
.ach-desc{font-size:11px;color:var(--txd);margin-top:2px;line-height:1.4}
.ach-progress-bg{height:3px;background:var(--ab3);border-radius:2px;margin-top:6px;overflow:hidden}
.ach-progress-fill{height:100%;background:var(--am);border-radius:2px;transition:width .8s ease}
.ach-progress-text{font-size:9px;color:var(--txd);margin-top:3px}
.ach-check{flex-shrink:0;color:var(--gr);font-size:16px}

.empty-state{margin:16px;padding:24px;text-align:center;color:var(--txd);font-size:11px;font-style:italic;border:1px dashed var(--bd);border-radius:4px}
</style>
</head>
<body>
<div class="app">
  <div class="banner">
    <div class="scan"></div>
    <a class="back-btn" href="hero.html"><i class="ti ti-arrow-left"></i></a>
    <div><div class="bn-title">Achievements</div><div class="bn-sub">Your full record</div></div>
  </div>

  <div class="progress-summary">
    <div class="progress-ring-wrap">
      <svg class="progress-ring-svg" viewBox="0 0 54 54" width="54" height="54">
        <circle class="progress-ring-bg" cx="27" cy="27" r="23"></circle>
        <circle class="progress-ring-fill" id="progress-ring-fill" cx="27" cy="27" r="23" stroke-dasharray="144.5" stroke-dashoffset="144.5"></circle>
      </svg>
      <div class="progress-ring-text" id="progress-ring-text">0%</div>
    </div>
    <div>
      <div class="progress-summary-label" id="progress-label">0 of 0 unlocked</div>
      <div class="progress-summary-sub">Keep playing to discover secret achievements</div>
    </div>
  </div>

  <div class="cat-tabs" id="cat-tabs"></div>
  <div class="ach-list" id="ach-list"></div>
</div>

<script src="data/seed-data.js"></script>
<script src="js/gamestate.js"></script>
<script src="js/leveling.js"></script>
<script src="js/attributes.js"></script>
<script src="js/skills.js"></script>
<script src="js/achievements.js"></script>
<script src="js/bosses.js"></script>
<script src="js/streak.js"></script>
<script src="js/quests.js"></script>
<script src="js/rewards.js"></script>
<script src="js/shield.js"></script>
<script src="js/gameloop.js"></script>
<script>
GameLoop.bootstrapDay();
let gs=GameState.get();
let activeCategory='all';

const CATEGORY_META=[
  {id:'quest',icon:'ti-sword',label:'Quest'},
  {id:'xp',icon:'ti-bolt',label:'XP'},
  {id:'streak',icon:'ti-flame',label:'Streak'},
  {id:'attribute',icon:'ti-chart-bar',label:'Attribute'},
  {id:'boss',icon:'ti-skull',label:'Boss'},
  {id:'reward',icon:'ti-gift',label:'Reward'},
  {id:'secret',icon:'ti-help-circle',label:'Secret'}
];

function renderProgressSummary(){
  const gallery=Achievements.getGallery(gs);
  const total=gallery.length;
  const unlockedCount=gallery.filter(a=>a.unlocked).length;
  const pct=total>0?Math.round((unlockedCount/total)*100):0;

  const circumference=144.5;
  document.getElementById('progress-ring-fill').style.strokeDashoffset=String(circumference-(pct/100)*circumference);
  document.getElementById('progress-ring-text').textContent=pct+'%';
  document.getElementById('progress-label').textContent=unlockedCount+' of '+total+' unlocked';
}

function renderCatTabs(){
  const tabs=[{id:'all',icon:'ti-layout-grid',label:'All'},...CATEGORY_META];
  document.getElementById('cat-tabs').innerHTML=tabs.map(c=>
    `<button class="cat-tab${activeCategory===c.id?' on':''}" onclick="setCategory('${c.id}')"><i class="ti ${c.icon}"></i>${c.label}</button>`
  ).join('');
}

function setCategory(id){
  activeCategory=id;
  renderCatTabs();renderList();
}

function renderList(){
  const gallery=Achievements.getGallery(gs);
  const filtered=activeCategory==='all'?gallery:gallery.filter(a=>a.category===activeCategory);
  const list=document.getElementById('ach-list');

  if(filtered.length===0){
    list.innerHTML='<div class="empty-state">No achievements in this category yet.</div>';
    return;
  }

  list.innerHTML=filtered.map(a=>{
    let cls='ach-card';
    if(a.unlocked) cls+=' unlocked';
    else if(a.secret) cls+=' secret-locked';
    else cls+=' locked';

    const progressBar=(!a.unlocked&&a.progress)
      ?`<div class="ach-progress-bg"><div class="ach-progress-fill" style="width:${a.progress.pct}%"></div></div>
         <div class="ach-progress-text">${a.progress.current} / ${a.progress.threshold}</div>`
      :'';

    return `<div class="${cls}">
      <div class="ach-icon"><i class="ti ${a.icon}"></i></div>
      <div class="ach-body">
        <div class="ach-name">${a.name}</div>
        <div class="ach-desc">${a.description}</div>
        ${progressBar}
      </div>
      ${a.unlocked?'<i class="ti ti-circle-check ach-check"></i>':''}
    </div>`;
  }).join('');
}

renderProgressSummary();
renderCatTabs();
renderList();
</script>
</body>
</html>
